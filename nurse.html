<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5276">
<link rel="manifest" href="manifest.json">
<title>術前評価（看護師用）</title>
<style>
:root {
  --primary: #1a5276;
  --primary-accent: #3498db;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --bg: #f5f6fa;
  --card: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #dcdfe3;
  --sidebar-w: 230px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
}

/* サイドバー */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--primary);
  color: #ecf0f1;
  overflow-y: auto;
  z-index: 200;
}
.sidebar-title {
  padding: 18px 16px 10px;
  font-size: 14px;
  font-weight: 700;
  border-bottom: 1px solid #2a6f97;
  text-align: center;
}
.sidebar-nav { list-style: none; padding: 6px 0; }
.sidebar-nav li {
  padding: 9px 16px;
  font-size: 12.5px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}
.sidebar-nav li:hover { background: #21618c; }
.sidebar-nav li.active {
  background: var(--primary-accent);
  border-left-color: #fff;
  font-weight: 700;
}
.sidebar-nav li.done {
  color: #82e0aa;
}
.sidebar-nav li.done::before { content: "\2713 "; }

/* メイン */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ヘッダー */
.top-bar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar h1 { font-size: 16px; color: var(--primary); }
.patient-badge {
  background: var(--primary-accent);
  color: #fff;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 13px;
}

/* コンテンツ */
.content { padding: 20px 28px; max-width: 900px; }
.step { display: none; }
.step.active { display: block; }

/* セクションヘッダー */
.section-hd {
  background: var(--primary-accent);
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px 8px 0 0;
  font-size: 15px;
  font-weight: 700;
  margin-top: 18px;
}
.section-desc {
  background: #eaf2f8;
  padding: 10px 18px;
  font-size: 12.5px;
  color: #555;
  border-radius: 0 0 8px 8px;
  margin-bottom: 12px;
}

/* カード */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
}

/* 質問 */
.q-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; }

/* ラジオ */
.radio-group { display: flex; flex-direction: column; gap: 4px; }
.radio-opt {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}
.radio-opt:hover { background: #f0f4f8; }
.radio-opt.selected { background: #d6eaf8; }
.radio-opt input { margin-right: 8px; accent-color: var(--primary-accent); }

/* チェックボックス */
.check-opt {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
}
.check-opt input { margin-right: 8px; width: 16px; height: 16px; accent-color: var(--primary-accent); }

/* 入力フィールド */
.field-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}
.field-row label {
  width: 140px;
  font-size: 13px;
  font-weight: 500;
  text-align: right;
  padding-right: 10px;
  flex-shrink: 0;
}
.field-row input, .field-row select {
  padding: 7px 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 260px;
  outline: none;
}
.field-row input:focus, .field-row select:focus { border-color: var(--primary-accent); }

/* スコア表示 */
.score-box {
  background: #eaf2f8;
  border: 1px solid #b8d4e8;
  border-radius: 8px;
  padding: 14px 18px;
  margin: 12px 0;
}
.score-val { font-size: 18px; font-weight: 700; color: var(--primary-accent); }
.score-judge { font-size: 14px; font-weight: 600; margin-top: 4px; }

.judge-normal { color: var(--success); }
.judge-warning { color: var(--warning); }
.judge-danger { color: var(--danger); }

/* 患者データ取得バッジ */
.patient-data-badge {
  display: inline-block;
  background: #d5f5e3;
  color: #1e8449;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
}

/* サマリーテーブル */
.summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.summary-table th {
  background: #d5e8f0;
  padding: 8px 10px;
  text-align: left;
  font-weight: 600;
}
.summary-table td { padding: 7px 10px; border-bottom: 1px solid #eee; }

/* ボタン */
.btn {
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-primary { background: var(--primary-accent); color: #fff; }
.btn-primary:hover { background: #2980b9; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #229954; }
.btn-secondary { background: #bdc3c7; color: #fff; }
.btn-secondary:hover { background: #95a5a6; }
.btn-calc { background: #8e44ad; color: #fff; }
.btn-calc:hover { background: #7d3c98; }

.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

textarea {
  width: 100%;
  padding: 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  resize: vertical;
  font-family: inherit;
}

/* ===== Mini-Cog 専用スタイル ===== */
.mc-sub { display: none; }
.mc-sub.mc-active { display: block; }

.role-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 14px;
  font-weight: 700;
}
.role-banner .role-icon { font-size: 22px; flex-shrink: 0; }
.role-banner .role-sub { font-size: 11px; font-weight: 400; margin-top: 2px; opacity: 0.85; }
.role-nurse { background: #eaf2fb; border: 2px solid #5b9bd5; color: #1a5276; }
.role-patient { background: #fef5e7; border: 2px solid #f5b041; color: #7e5109; }
.role-both { background: #eafaf1; border: 2px solid #58d68d; color: #1e8449; }

.handoff-notice {
  text-align: center;
  background: linear-gradient(135deg, #f39c12, #e67e22);
  color: #fff;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 14px;
}
.handoff-notice .handoff-title { font-size: 16px; font-weight: 700; }
.handoff-notice .handoff-desc { font-size: 12px; opacity: 0.9; margin-top: 3px; }

.takeback-notice {
  text-align: center;
  background: linear-gradient(135deg, #3498db, #2980b9);
  color: #fff;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 14px;
}
.takeback-notice .handoff-title { font-size: 16px; font-weight: 700; }
.takeback-notice .handoff-desc { font-size: 12px; opacity: 0.9; margin-top: 3px; }

.mc-word-display {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 16px 0;
}
.mc-word-chip {
  background: var(--primary-accent);
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 14px;
  box-shadow: 0 3px 10px rgba(52,152,219,0.3);
}

.mc-instruction {
  background: #fff3cd;
  border: 1px solid #ffc107;
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.7;
}
.mc-instruction strong { color: #856404; }

.mc-canvas-wrap { text-align: center; margin: 12px 0; }
.mc-canvas-wrap canvas {
  border: 3px solid var(--border);
  border-radius: 10px;
  background: #fff;
  touch-action: none;
  cursor: crosshair;
}
.mc-canvas-controls {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
}
.mc-pen-sizes {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 6px 0;
}
.mc-pen-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.mc-pen-btn.active { border-color: var(--primary-accent); background: #eaf2f8; }
.mc-pen-dot { border-radius: 50%; background: #333; }

.mc-timer-badge {
  display: inline-block;
  background: #fff3cd;
  color: #856404;
  font-size: 15px;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 18px;
  margin: 8px 0;
}

.mc-sub-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.mc-progress {
  text-align: center;
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 12px;
}

.mc-cdt-guide {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin: 10px 0;
}
.mc-cdt-item {
  background: #f8f9fa;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
}
.mc-cdt-item .chk { color: var(--success); font-weight: 700; }

.mc-score-big {
  font-size: 56px;
  font-weight: 800;
  text-align: center;
  line-height: 1;
}
.mc-score-label {
  text-align: center;
  font-size: 14px;
  color: var(--text-light);
  margin-top: 2px;
}
.mc-score-breakdown {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 14px 0;
}
.mc-score-item { text-align: center; }
.mc-score-item .num { font-size: 24px; font-weight: 700; }
.mc-score-item .lbl { font-size: 11px; color: var(--text-light); }

.mc-judge-badge {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}
.mc-judge-ok { background: var(--success); }
.mc-judge-ng { background: var(--danger); }

.mc-clock-thumb { margin: 12px auto; max-width: 220px; }
.mc-clock-thumb img { width: 100%; border-radius: 10px; border: 2px solid var(--border); }

.mc-radio-group { display: flex; flex-direction: column; gap: 5px; }
.mc-radio-opt {
  display: flex;
  align-items: center;
  background: #eaf2f8;
  border: 2px solid transparent;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.mc-radio-opt:hover { border-color: var(--primary-accent); }
.mc-radio-opt.selected { border-color: var(--primary-accent); background: #d6eaf8; }
.mc-radio-opt input[type="radio"] { width: 18px; height: 18px; margin-right: 10px; accent-color: var(--primary-accent); }

.mc-wl-radio { display: flex; flex-direction: column; gap: 4px; }
.mc-wl-opt {
  display: flex; align-items: center;
  padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  border: 2px solid transparent; transition: all 0.15s;
}
.mc-wl-opt:hover { background: #f0f4f8; }
.mc-wl-opt.selected { border-color: var(--primary-accent); background: #d6eaf8; }
.mc-wl-opt input { margin-right: 8px; accent-color: var(--primary-accent); }

/* タッチ操作最適化 */
input, select, textarea, button { font-size: 16px; }
textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 14px; font-family: inherit; }

/* === タブレット最適化 === */
@media (max-width: 1024px) {
  :root { --sidebar-w: 200px; }
  .sidebar-nav li { padding: 12px 16px; font-size: 13px; min-height: 44px; display: flex; align-items: center; }
  .content { padding: 16px 20px; }
  .radio-opt { padding: 10px 12px; font-size: 14px; min-height: 44px; }
  .check-opt { padding: 10px 12px; font-size: 14px; min-height: 44px; }
  .check-opt input { width: 20px; height: 20px; }
  .radio-opt input { width: 18px; height: 18px; }
  .q-label { font-size: 14px; }
  .field-row input, .field-row select { font-size: 16px; padding: 10px 12px; }
  .field-row label { font-size: 14px; }
  .btn { min-height: 48px; font-size: 15px; }
  .section-hd { font-size: 16px; padding: 12px 18px; }
}
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    width: 240px;
  }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .top-bar { padding: 10px 16px; }
  .content { padding: 12px 16px; }
  .field-row { flex-direction: column; align-items: flex-start; }
  .field-row label { width: auto; text-align: left; padding-right: 0; margin-bottom: 4px; }
  .field-row input, .field-row select { width: 100%; }
  .menu-toggle { display: block !important; }
}
.sidebar-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 199;
}
.sidebar.open + .sidebar-backdrop,
.sidebar.open ~ .sidebar-backdrop { display: block; }
</style>
</head>
<body>

<!-- サイドバー -->
<div class="sidebar">
  <div class="sidebar-title">術前評価（看護師用）</div>
  <ul class="sidebar-nav" id="sidebarNav"></ul>
</div>

<!-- メイン -->
<div class="main">
  <div class="top-bar">
    <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')" style="display:none; background:none; border:none; font-size:24px; cursor:pointer; padding:4px 8px; color:var(--primary);">&#9776;</button>
    <h1>看護師用 評価入力</h1>
    <div>
      <span class="patient-badge" id="topPatientId">患者未選択</span>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// =========================================================================
// ステップ定義
// =========================================================================
var STEPS = [
  { id: 'info',    name: '1. 患者基本情報' },
  { id: 'g8',      name: '2. G8' },
  { id: 'cfs',     name: '3. CFS' },
  { id: 'fried',   name: '4. 改訂J-CHS' },
  { id: 'minicog', name: '5. Mini-Cog' },
  { id: 'iadl',    name: '6. Lawton IADL' },
  { id: 'summary', name: '7. 保存・確認' },
];

var currentStep = 0;
var completedSteps = new Set();
var nurseData = {};     // 看護師入力データ
var patientData = null; // 患者入力データ（localStorageから読み込み）

// =========================================================================
// サイドバー
// =========================================================================
function buildSidebar() {
  var nav = document.getElementById('sidebarNav');
  nav.innerHTML = STEPS.map(function(s, i) {
    return '<li data-idx="' + i + '" onclick="goStep(' + i + ')">' + s.name + '</li>';
  }).join('');
  updateSidebar();
}

function updateSidebar() {
  document.querySelectorAll('.sidebar-nav li').forEach(function(li, i) {
    li.classList.toggle('active', i === currentStep);
    li.classList.toggle('done', completedSteps.has(i));
  });
}

// =========================================================================
// ステップ切り替え
// =========================================================================
function goStep(n) {
  saveCurrentStep();
  currentStep = n;
  renderStep();
  updateSidebar();
  window.scrollTo({top: 0});
}

function nextStep() {
  saveCurrentStep();
  completedSteps.add(currentStep);
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
    updateSidebar();
    window.scrollTo({top: 0});
  }
}

function prevStep() {
  saveCurrentStep();
  if (currentStep > 0) { currentStep--; renderStep(); updateSidebar(); window.scrollTo({top: 0}); }
}

// =========================================================================
// データ保存・読み込み
// =========================================================================
function saveCurrentStep() {
  // ラジオ
  document.querySelectorAll('.radio-group[data-key]').forEach(function(g) {
    var c = g.querySelector('input:checked');
    if (c) nurseData[g.dataset.key] = c.value;
  });
  // チェックボックス
  document.querySelectorAll('.check-opt input[type="checkbox"]').forEach(function(cb) {
    nurseData[cb.dataset.key] = cb.checked ? 1 : 0;
  });
  // テキスト入力
  document.querySelectorAll('input[data-key]').forEach(function(inp) {
    nurseData[inp.dataset.key] = inp.value;
  });
  document.querySelectorAll('select[data-key]').forEach(function(sel) {
    nurseData[sel.dataset.key] = sel.value;
  });
  // テキストエリア
  document.querySelectorAll('textarea[data-key]').forEach(function(ta) {
    nurseData[ta.dataset.key] = ta.value;
  });
}

function loadPatientData(pid) {
  var key = 'assessment_patient_' + pid;
  var raw = localStorage.getItem(key);
  if (raw) {
    patientData = JSON.parse(raw);
    return true;
  }
  patientData = null;
  return false;
}

function getVal(key, fallback) {
  if (nurseData[key] !== undefined && nurseData[key] !== '') return nurseData[key];
  if (patientData && patientData[key] !== undefined && patientData[key] !== '') return patientData[key];
  return fallback !== undefined ? fallback : '';
}

function isPatientVal(key) {
  return patientData && patientData[key] !== undefined && patientData[key] !== ''
    && (nurseData[key] === undefined || nurseData[key] === '');
}

// =========================================================================
// HTML生成ヘルパー
// =========================================================================
function h_section(title, desc) {
  return '<div class="section-hd">' + title + '</div>' +
    (desc ? '<div class="section-desc">' + desc + '</div>' : '');
}

function h_field(key, label, opts) {
  opts = opts || {};
  var val = getVal(key, opts.def || '');
  var badge = isPatientVal(key) ? '<span class="patient-data-badge">患者入力</span>' : '';
  var type = opts.type || 'text';
  var w = opts.width || '260px';
  return '<div class="field-row">' +
    '<label>' + label + badge + '</label>' +
    '<input type="' + type + '" data-key="' + key + '" value="' + val + '" style="width:' + w + '"' +
    (opts.placeholder ? ' placeholder="' + opts.placeholder + '"' : '') +
    (opts.step ? ' step="' + opts.step + '"' : '') +
    '></div>';
}

function h_radio(key, label, options) {
  var curVal = getVal(key);
  var badge = isPatientVal(key) ? '<span class="patient-data-badge">患者入力</span>' : '';
  var html = '<div class="card"><div class="q-label">' + label + badge + '</div><div class="radio-group" data-key="' + key + '">';
  for (var i = 0; i < options.length; i++) {
    var text = options[i][0], val = options[i][1];
    var checked = String(curVal) === String(val) ? 'checked' : '';
    var sel = checked ? 'selected' : '';
    html += '<label class="radio-opt ' + sel + '"><input type="radio" name="' + key + '" value="' + val + '" ' + checked + '>' + text + '</label>';
  }
  html += '</div></div>';
  return html;
}

function h_check(key, text) {
  var checked = getVal(key) == 1 ? 'checked' : '';
  return '<label class="check-opt"><input type="checkbox" data-key="' + key + '" ' + checked + '>' + text + '</label>';
}

function h_score(id) {
  return '<div class="score-box" id="score_' + id + '">' +
    '<div class="score-val" id="scoreVal_' + id + '">スコア: 未計算</div>' +
    '<div class="score-judge" id="scoreJudge_' + id + '"></div>' +
    '<button class="btn btn-calc btn-sm" onclick="calcScore(\'' + id + '\')" style="margin-top:8px;">スコア計算</button>' +
    '</div>';
}

function h_nav() {
  var isLast = currentStep === STEPS.length - 1;
  return '<div class="nav-bar">' +
    '<button class="btn btn-secondary" onclick="prevStep()" ' + (currentStep === 0 ? 'disabled' : '') + '>&#9664; 前へ</button>' +
    '<span style="font-size:12px; color:var(--text-light);">' + (currentStep + 1) + ' / ' + STEPS.length + '</span>' +
    '<button class="btn ' + (isLast ? 'btn-success' : 'btn-primary') + '" onclick="nextStep()">' + (isLast ? '完了' : '次へ &#9654;') + '</button>' +
    '</div>';
}

// =========================================================================
// 各ステップのレンダリング
// =========================================================================
function renderStep() {
  var el = document.getElementById('content');
  var renderers = [
    renderInfo, renderG8, renderCFS, renderFried,
    renderMiniCog, renderIADL, renderSummary
  ];
  el.innerHTML = renderers[currentStep]() + h_nav();

  // ラジオのスタイル
  el.querySelectorAll('.radio-group input').forEach(function(r) {
    r.addEventListener('change', function() {
      this.closest('.radio-group').querySelectorAll('.radio-opt').forEach(function(o) { o.classList.remove('selected'); });
      this.closest('.radio-opt').classList.add('selected');
    });
  });

  // Mini-Cog ステップの場合、キャンバスとラジオを初期化
  if (STEPS[currentStep].id === 'minicog') {
    mcCanvasReady = false;
    mcCanvas = null; mcCtx = null;
    setTimeout(function(){ mcPostRender(); }, 50);
  }
}

function renderG8() {
  var html = h_section('G8スクリーニング（看護師観察分）', '看護師が臨床観察で評価する項目のみ。患者自己申告分（A, B, P）は患者入力から流用されます。');

  ]);

    ['重度認知症/うつ (0)', 0], ['中等度認知障害 (1)', 1], ['問題なし (2)', 2]

    g8hAuto = ' <span style="color:#8e44ad; font-size:11px;">\u2190 ' + dc + '種類 \u2192 ' + (g8h === 0 ? '4種以上: はい(0)' : '4種未満: いいえ(1)') + '</span>';
  }
  html += '<div class="card"><div class="q-label">H. 処方薬数' + g8hAuto + '</div>' +
    '<div class="field-row" style="margin-top:8px;">' +
    '<label>現在の処方薬数:</label>' +
    '<div style="display:flex; align-items:center; gap:6px;">' +
    '<input type="number" data-key="g8_drug_count" value="' + getVal('g8_drug_count') + '" style="width:80px; padding:7px 10px; font-size:13px; border:1px solid var(--border); border-radius:6px;" min="0" step="1" placeholder="例: 5">' +

    '</div></div>' +
    '<div style="margin:4px 0 0 150px; font-size:11px; color:#7d3c98;">\u203B 4種類以上で G8 H項 = 0（はい）、4種類未満で 1（いいえ）と自動判定</div>' +
    '</div>';

  // G8 F(BMI)自動設定
  var bmi = parseFloat(getVal('patient_bmi', 0));
  if (bmi > 0) {
    var g8f;
    if (bmi < 19) g8f = 0;
    else if (bmi < 21) g8f = 1;
    else if (bmi < 23) g8f = 2;
    else g8f = 3;
    nurseData.g8_f = g8f;
    var g8fLabels = {0:'19未満', 1:'19-21', 2:'21-23', 3:'23以上'};
    html += '<div class="card"><div class="q-label">F. BMI区分 <span style="color:#8e44ad; font-size:11px;">\u2190 BMI ' + bmi + ' から自動設定: ' + g8fLabels[g8f] + ' (' + g8f + ')</span></div></div>';
  }

  // 年齢自動判定
  var age = parseInt(getVal('patient_age', 0));
  if (age > 0) {
    var g8age;
    if (age >= 86) g8age = 0;
    else if (age >= 80) g8age = 1;
    else g8age = 2;
    nurseData.g8_age = g8age;
    var ageLbl = {0:'86歳以上', 1:'80-85歳', 2:'80歳未満'};
    html += '<div class="card"><div class="q-label">年齢区分 <span style="color:#8e44ad; font-size:11px;">\u2190 ' + age + '歳 \u2192 ' + ageLbl[g8age] + ' (' + g8age + ')</span></div></div>';
  }

  html += h_radio('cga_social', '社会的支援', [
    ['十分（同居家族あり）', '十分'],
    ['部分的（独居・近隣に支援者）', '部分的'],
    ['不十分（独居・支援なし）', '不十分']
  ]);

  html += h_score('g8');
  return html;
}

// ---- Step 3: 改訂J-CHS 計測項目 ----
function renderFried() {
  var html = h_section('改訂J-CHS基準（計測項目）', '看護師が計測する握力・歩行速度・下腿周囲長を入力してください。');

  // 握力
  var sex = getVal('patient_sex');
  var gripR = parseFloat(getVal('fried_grip_r', 0));
  var gripL = parseFloat(getVal('fried_grip_l', 0));
  var gripMax = Math.max(gripR, gripL);
  var gripAutoMsg = '';
  if (gripMax > 0 && sex) {
    var threshold = sex === 'M' ? 28 : 18;
    var gripResult = gripMax < threshold ? 1 : 0;
    nurseData.fried_grip = gripResult;
    gripAutoMsg = ' <span style="color:#8e44ad; font-size:11px;">\u2190 自動判定: 最大' + gripMax + 'kg（' + (sex === 'M' ? '男性' : '女性') + '基準' + threshold + 'kg ' + (gripResult ? '未満\u2192該当' : '以上\u2192非該当') + '）</span>';
  }
  html += '<div class="card"><div class="q-label">握力' + gripAutoMsg + '</div>' +
    '<div class="field-row" style="margin-top:8px;">' +
    '<label>右手握力 (kg):</label>' +
    '<input type="number" data-key="fried_grip_r" value="' + getVal('fried_grip_r') + '" style="width:100px; padding:7px 10px; font-size:13px; border:1px solid var(--border); border-radius:6px;" step="0.1">' +
    '</div>' +
    '<div class="field-row">' +
    '<label>左手握力 (kg):</label>' +
    '<input type="number" data-key="fried_grip_l" value="' + getVal('fried_grip_l') + '" style="width:100px; padding:7px 10px; font-size:13px; border:1px solid var(--border); border-radius:6px;" step="0.1">' +
    '</div>' +
    '<div id="gripJudge" style="margin:6px 0 0 150px; font-size:12px; font-weight:600;"></div>' +
    '<div style="margin:4px 0 0 150px; font-size:11px; color:#7d3c98;">基準：男性 28kg未満、女性 18kg未満で該当（最大値で判定）</div>' +
    '</div>';

  // 歩行速度
  var speed = parseFloat(getVal('fried_walk_speed', 0));
  var walkAutoMsg = '';
  if (speed > 0) {
    var walkResult = speed < 1.0 ? 1 : 0;
    nurseData.fried_walk = walkResult;
    walkAutoMsg = ' <span style="color:#8e44ad; font-size:11px;">\u2190 自動判定: ' + speed + ' m/秒（' + (walkResult ? '該当' : '非該当') + '）</span>';
  }
  html += '<div class="card"><div class="q-label">歩行速度' + walkAutoMsg + '</div>' +
    '<div class="field-row" style="margin-top:8px;">' +

    '</div>' +
    '<div id="walkJudge" style="margin:6px 0 0 150px; font-size:12px; font-weight:600;"></div>' +
    '<div style="margin:4px 0 0 150px; font-size:11px; color:#7d3c98;">基準：1.0 m/秒未満で該当</div>' +
    '</div>';

  // 下腿周囲長
  html += '<div class="card"><div class="q-label">下腿周囲長（GLIM用）</div>' +
    '<div class="field-row" style="margin-top:8px;">' +
    '<label>下腿周囲長 (cm):</label>' +
    '<input type="number" data-key="glim_calf" value="' + getVal('glim_calf') + '" style="width:120px; padding:7px 10px; font-size:13px; border:1px solid var(--border); border-radius:6px;" step="0.1" placeholder="例: 31.5">' +
    '</div>' +

    '</div>';

  html += '<button class="btn btn-calc btn-sm" onclick="autoJudgeFried()" style="margin:12px 0;">自動判定を更新</button>';
  html += '<div id="friedAutoResult" style="font-size:12px; margin-bottom:8px;"></div>';
  return html;
}

// === Mini-Cog サブステップ管理 ===
function mcGoSub(n) {
  // タイマー管理
  if (n === 2 && mcSub !== 2) mcStartTimer();
  else if (mcSub === 2 && n !== 2) mcStopTimer();

  document.querySelectorAll('.mc-sub').forEach(function(s) { s.classList.remove('mc-active'); });
  var el = document.querySelector('.mc-sub[data-mc="' + n + '"]');
  if (el) el.classList.add('mc-active');
  mcSub = n;

  if (n === 1) {
    document.getElementById('mcWordDisplay1').innerHTML =
      mcWords.map(function(w) { return '<span class="mc-word-chip">' + w + '</span>'; }).join('');
  }
  if (n === 2) {
    if (!mcCanvas || !mcCanvas.getContext) mcInitCanvas();
  }
  if (n === 3) {
    document.getElementById('mcWordDisplay3').innerHTML =
      mcWords.map(function(w) { return '<span class="mc-word-chip">' + w + '</span>'; }).join('');
  }
  if (n === 4) {
    document.getElementById('mcClockPreview').src = mcClockImage || (mcCanvas ? mcCanvas.toDataURL() : '');
  }

  var sectionHd = document.querySelector('.section-hd');
  if (sectionHd) window.scrollTo({top: sectionHd.offsetTop - 60});
}

function mcPostRender() {
  // ラジオスタイル
  document.querySelectorAll('.mc-radio-group input, .mc-wl-radio input').forEach(function(r) {
    r.addEventListener('change', function() {
      var grp = this.closest('.mc-radio-group') || this.closest('.mc-wl-radio');
      if (grp) {
        grp.querySelectorAll('.mc-radio-opt, .mc-wl-opt').forEach(function(o) { o.classList.remove('selected'); });
        this.closest('.mc-radio-opt, .mc-wl-opt').classList.add('selected');
      }
    });
  });
  mcCanvas = null; mcCtx = null;
}

function mcStartTest() {
  var checked = document.querySelector('input[name="mc_wl"]:checked');
  if (!checked) { alert('単語リストを選択してください。'); return; }
  mcSelectedList = parseInt(checked.value);
  mcWords = MC_WORD_LISTS[mcSelectedList].words.slice();
  mcTimerSec = 0;
  mcClear();
  mcGoSub(1);
}

// === キャンバス ===
var mcCanvasReady = false;
function mcInitCanvas() {
  mcCanvas = document.getElementById('mcClockCanvas');
  if (!mcCanvas) return;
  mcCtx = mcCanvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var size = 280;
  mcCanvas.width = size * dpr;
  mcCanvas.height = size * dpr;
  mcCanvas.style.width = size + 'px';
  mcCanvas.style.height = size + 'px';
  mcCtx.scale(dpr, dpr);
  mcDrawBase();
  mcStrokeHistory = [];
  mcSaveStroke();

  if (!mcCanvasReady) {
    mcCanvas.addEventListener('mousedown', mcOnStart);
    mcCanvas.addEventListener('mousemove', mcOnMove);
    mcCanvas.addEventListener('mouseup', mcOnEnd);
    mcCanvas.addEventListener('mouseleave', mcOnEnd);
    mcCanvas.addEventListener('touchstart', function(e) { e.preventDefault(); mcOnStart({clientX: e.touches[0].clientX, clientY: e.touches[0].clientY}); }, {passive:false});
    mcCanvas.addEventListener('touchmove', function(e) { e.preventDefault(); mcOnMove({clientX: e.touches[0].clientX, clientY: e.touches[0].clientY}); }, {passive:false});
    mcCanvas.addEventListener('touchend', mcOnEnd);
    mcCanvasReady = true;
  }
}

function mcDrawBase() {
  var s = 280, cx = s/2, cy = s/2, r = s/2 - 14;
  mcCtx.clearRect(0, 0, s, s);
  mcCtx.beginPath();
  mcCtx.arc(cx, cy, r, 0, Math.PI*2);
  mcCtx.strokeStyle = '#ccc';
  mcCtx.lineWidth = 2;
  mcCtx.stroke();
  mcCtx.beginPath();
  mcCtx.arc(cx, cy, 3, 0, Math.PI*2);
  mcCtx.fillStyle = '#ccc';
  mcCtx.fill();
}

function mcGetPos(e) {
  var r = mcCanvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function mcOnStart(e) {
  mcDrawing = true;
  var p = mcGetPos(e);
  mcCtx.beginPath();
  mcCtx.moveTo(p.x, p.y);
  mcCtx.strokeStyle = '#000';
  mcCtx.lineWidth = mcPenSize;
  mcCtx.lineCap = 'round';
  mcCtx.lineJoin = 'round';
}
function mcOnMove(e) {
  if (!mcDrawing) return;
  var p = mcGetPos(e);
  mcCtx.lineTo(p.x, p.y);
  mcCtx.stroke();
}
function mcOnEnd() {
  if (mcDrawing) { mcDrawing = false; mcSaveStroke(); }
}
function mcSaveStroke() {
  mcStrokeHistory.push(mcCtx.getImageData(0, 0, mcCanvas.width, mcCanvas.height));
  if (mcStrokeHistory.length > 50) mcStrokeHistory.shift();
}
function mcUndo() {
  if (mcStrokeHistory.length > 1) {
    mcStrokeHistory.pop();
    mcCtx.putImageData(mcStrokeHistory[mcStrokeHistory.length - 1], 0, 0);
  }
}
function mcClear() {
  if (!mcCanvas) return;
  var dpr = window.devicePixelRatio || 1;
  mcCtx.setTransform(1, 0, 0, 1, 0, 0);
  mcCtx.clearRect(0, 0, mcCanvas.width, mcCanvas.height);
  mcCtx.scale(dpr, dpr);
  mcDrawBase();
  mcStrokeHistory = [];
  mcSaveStroke();
}
function mcSetPen(size, btn) {
  mcPenSize = size;
  document.querySelectorAll('.mc-pen-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}
function mcFinishDraw() {
  if (mcCanvas) mcClockImage = mcCanvas.toDataURL('image/png');
  mcGoSub(3);
}

// === タイマー ===
function mcStartTimer() {
  mcStopTimer();
  mcUpdateTimer();
  mcTimerInterval = setInterval(function() { mcTimerSec++; mcUpdateTimer(); }, 1000);
}
function mcStopTimer() {
  if (mcTimerInterval) { clearInterval(mcTimerInterval); mcTimerInterval = null; }
}
function mcUpdateTimer() {
  var m = Math.floor(mcTimerSec / 60), s = mcTimerSec % 60;
  var el = document.getElementById('mcTimerBadge');
  if (el) el.textContent = '経過時間: ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// === 結果表示 ===
function mcShowResult() {
  var recallEl = document.querySelector('input[name="mc_recall"]:checked');
  var cdtEl = document.querySelector('input[name="mc_cdt"]:checked');
  if (!recallEl) { alert('遅延再生のスコアを選択してください。'); return; }
  if (!cdtEl) { alert('時計描画テストの判定を選択してください。'); return; }

  var recall = parseInt(recallEl.value);
  var cdt = parseInt(cdtEl.value);
  var total = recall + cdt;
  var impaired = total <= 2;
  var color = impaired ? 'var(--danger)' : 'var(--success)';
  var judgeText = impaired ? '認知機能低下の疑いあり' : '認知機能低下の疑いなし';
  var badgeClass = impaired ? 'mc-judge-ng' : 'mc-judge-ok';

  // nurseDataに反映
  nurseData.minicog_recall = String(recall);
  nurseData.minicog_clock = String(cdt);
  nurseData._minicog_score = total;
  nurseData._minicog_judge = impaired ? '認知機能低下疑い' : (total <= 3 ? '境界域' : '正常');

  document.getElementById('mcResultCard').innerHTML =
    '<div class="mc-score-big" style="color:' + color + ';">' + total + '</div>' +
    '<div class="mc-score-label">/ 5点</div>' +
    '<div class="mc-score-breakdown">' +
    '<div class="mc-score-item"><div class="num">' + recall + '</div><div class="lbl">遅延再生 (0-3)</div></div>' +
    '<div class="mc-score-item"><div class="num">' + cdt + '</div><div class="lbl">時計描画 (0 or 2)</div></div>' +
    '</div>' +
    '<div style="text-align:center;"><span class="mc-judge-badge ' + badgeClass + '">' + judgeText + '</span></div>';

  var m = Math.floor(mcTimerSec / 60), s = mcTimerSec % 60;
  document.getElementById('mcResultDetail').innerHTML =
    '<div class="q-label">検査詳細</div>' +
    '<table style="width:100%;font-size:13px;border-collapse:collapse;margin-top:8px;">' +
    '<tr style="border-bottom:1px solid #eee;"><td style="padding:6px;color:#888;">使用単語リスト</td><td style="padding:6px;">リスト' + MC_WORD_LISTS[mcSelectedList].id + ': ' + mcWords.join('、') + '</td></tr>' +
    '<tr style="border-bottom:1px solid #eee;"><td style="padding:6px;color:#888;">描画所要時間</td><td style="padding:6px;">' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + '</td></tr>' +
    '<tr style="border-bottom:1px solid #eee;"><td style="padding:6px;color:#888;">遅延再生スコア</td><td style="padding:6px;">' + recall + ' / 3</td></tr>' +
    '<tr><td style="padding:6px;color:#888;">時計描画テスト</td><td style="padding:6px;">' + (cdt === 2 ? '正常 (2点)' : '異常 (0点)') + '</td></tr>' +
    '</table>' +
    (mcClockImage ? '<div class="mc-clock-thumb" style="margin-top:12px;"><div class="q-label" style="text-align:center;">時計描画</div><img src="' + mcClockImage + '" alt="時計描画"></div>' : '') +
    '<div style="background:#eaf2f8;border-radius:6px;padding:10px 14px;margin-top:12px;font-size:12px;line-height:1.7;">' +
    '<strong>判定基準：</strong> 合計 0〜2点 → 認知機能低下の疑いあり / 合計 3〜5点 → 疑いなし' +
    '</div>';

  mcGoSub(5);
}

function mcRestart() {
  mcSelectedList = -1;
  mcWords = [];
  mcClockImage = '';
  mcTimerSec = 0;
  mcStopTimer();
  mcClear();
  document.querySelectorAll('.mc-sub input[type="radio"]').forEach(function(r) { r.checked = false; });
  document.querySelectorAll('.mc-sub .mc-radio-opt, .mc-sub .mc-wl-opt').forEach(function(o) { o.classList.remove('selected'); });
  mcGoSub(0);
}

    var jClass = judgeCls(nurseData._minicog_judge);
    html += '<p style="font-size:13px;">スコア: <strong>' + nurseData._minicog_score + '</strong> / 5</p>' +
      '<p style="font-size:13px;" class="' + jClass + '">判定: <strong>' + nurseData._minicog_judge + '</strong></p>';
  } else {
    html += '<p style="font-size:13px; color:var(--text-light);">未実施</p>';
  }
  html += '</div>';

  // IADL
  var iadlLabels = ['A.電話','B.買い物','C.食事の支度','D.家事','E.洗濯','F.外出','G.服薬管理','H.金銭管理'];
  html += '<div class="card"><div class="q-label">【Lawton IADL】</div>';
  html += '<table class="summary-table">';
  for (var ii = 0; ii < 8; ii++) {
    var iv = getVal('iadl_' + ii, '-');
    var iscore = (iv !== '-' && iv !== '') ? parseFloat(iv) : '-';
    html += '<tr><td>' + iadlLabels[ii] + '</td><td>' + (iscore !== '-' ? iscore + '点' : '未回答') + '</td></tr>';
  }
  html += '</table>';
  if (nurseData._iadl_score !== undefined) {
    var iadlJClass = judgeCls(nurseData._iadl_judge);
    html += '<p style="font-size:13px; margin-top:8px;">スコア: <strong>' + nurseData._iadl_score + '</strong> / 8 <span class="' + iadlJClass + '" style="font-weight:600;">' + nurseData._iadl_judge + '</span></p>';
  }
  html += '</div>';

  // 保存ボタン
  html += '<div style="text-align:center; margin-top:20px;">' +
    '<button class="btn btn-success" onclick="saveToLocalStorage()" style="padding:14px 40px; font-size:15px;">保存</button>' +
    '</div>';
  html += '<div id="saveResult" style="text-align:center; margin-top:12px; font-size:14px;"></div>';

  return html;
}

// =========================================================================
// 判定クラス
// =========================================================================
function judgeCls(j) {
  if (!j) return '';
  var danger = ['脆弱（異常）','フレイル','重度フレイル','低栄養','認知機能低下疑い','重度低下','高リスク','GLIM低栄養'];
  var warn = ['プレフレイル','低栄養のおそれ','境界域','中等度低下','中リスク'];
  if (danger.indexOf(j) >= 0) return 'judge-danger';
  if (warn.indexOf(j) >= 0) return 'judge-warning';
  return 'judge-normal';
}

// =========================================================================
// スコア計算
// =========================================================================
function calcScore(id) {
  saveCurrentStep();
  var valEl = document.getElementById('scoreVal_' + id);
  var judgeEl = document.getElementById('scoreJudge_' + id);
  if (!valEl) return;

  try {
    var calcs = { g8: calcG8, cfs: calcCFS, iadl: calcIADL };
    var result = calcs[id]();
    valEl.textContent = result.text;
    judgeEl.textContent = '判定: ' + result.judge;
    judgeEl.className = 'score-judge ' + judgeCls(result.judge);
  } catch(e) {
    valEl.textContent = 'エラー: 全項目を入力してください';
    judgeEl.textContent = '';
  }
}

function gv(k) { return parseFloat(getVal(k, 0)); }

function calcG8() {
  // 看護師入力分: C, E, H, F(自動), age(自動)
  var t = gv('g8_c') + gv('g8_e') + gv('g8_h') + gv('g8_f') + gv('g8_age');
  nurseData._g8_nurse_score = t;
  return { text: 'G8（看護師分）: ' + t + ' / 8', judge: t <= 5 ? '要確認' : '正常範囲' };
}

function calcCFS() {
  var s = parseInt(getVal('cfs_score', 0));
  nurseData._cfs_val = s;
  var j = '非フレイル';
  if (s >= 7) j = '重度フレイル';
  else if (s >= 5) j = 'フレイル';
  else if (s === 4) j = 'プレフレイル';
  nurseData._cfs_judge = j;
  return { text: 'CFS: ' + s + ' / 9', judge: j };
}

function calcIADL() {
  var t = 0;
  for (var i = 0; i < 8; i++) {
    t += parseFloat(getVal('iadl_' + i, 0));
  }
  nurseData._iadl_score = t;
  var j = '自立';
  if (t <= 4) j = '重度低下';
  else if (t <= 6) j = '中等度低下';
  else if (t <= 7) j = '軽度低下';
  nurseData._iadl_judge = j;
  return { text: 'Lawton IADL: ' + t + ' / 8', judge: j };
}

function recalcAll() {
  // 処方薬数 → g8_h 自動判定
  var dc = getVal('g8_drug_count');
  if (dc !== '') {
    nurseData.g8_h = parseInt(dc) >= 4 ? 0 : 1;
  }
  try { calcG8(); } catch(e) {}
  try { calcCFS(); } catch(e) {}
  try { calcIADL(); } catch(e) {}
  // 握力・歩行速度の自動判定
  autoJudgeFriedSilent();
}

// =========================================================================
// 補助機能
// =========================================================================
function tryLoadPatient() {
  saveCurrentStep();
  var pid = getVal('patient_id');
  if (!pid) { alert('患者IDを入力してください'); return; }
  var found = loadPatientData(pid);
  var el = document.getElementById('loadResult');
  if (found) {
    el.innerHTML = '<span style="color:#27ae60; font-weight:600;">患者データを読み込みました</span>';
    document.getElementById('topPatientId').textContent = 'ID: ' + pid;
    // 患者データから基本情報を流用
    if (patientData.patient_name && !nurseData.patient_name) nurseData.patient_name = patientData.patient_name;
    if (patientData.patient_age && !nurseData.patient_age) nurseData.patient_age = patientData.patient_age;
    if (patientData.patient_sex && !nurseData.patient_sex) nurseData.patient_sex = patientData.patient_sex;
    renderStep();
  } else {
    el.innerHTML = '<span style="color:#e74c3c;">患者データが見つかりません（患者用アンケートが未回答です）</span>';
  }
}

function calcWeightAndBMI() {
  saveCurrentStep();
  var h = parseFloat(getVal('patient_height', 0)) / 100;
  var wNow = parseFloat(getVal('patient_weight', 0));
  var w3m = parseFloat(getVal('weight_3m', 0));
  var w6m = parseFloat(getVal('weight_6m', 0));
  var w1y = parseFloat(getVal('weight_1y', 0));

  var msgs = [];
  var filled = [];

  // BMI
  if (h > 0 && wNow > 0) {
    var bmi = wNow / (h * h);
    var bmiStr = bmi.toFixed(1);
    nurseData.patient_bmi = bmiStr;
    msgs.push('BMI = ' + bmiStr + ' kg/m\u00B2');

    // G8 F項 (BMI区分) を自動設定
    var g8f;
    if (bmi < 19) g8f = 0;
    else if (bmi < 21) g8f = 1;
    else if (bmi < 23) g8f = 2;
    else g8f = 3;
    nurseData.g8_f = g8f;
    var g8fLabels = {0:'19未満', 1:'19-21', 2:'21-23', 3:'23以上'};
    filled.push('G8 F項(BMI) \u2192 ' + g8fLabels[g8f] + '（' + bmiStr + '）');
  }

  // 3ヶ月間の体重変化
  if (wNow > 0 && w3m > 0) {
    var diff3m = w3m - wNow;
    msgs.push('3ヶ月間の変化: ' + (diff3m > 0 ? '-' : '+') + Math.abs(diff3m).toFixed(1) + 'kg');
  }

  // 半年間の体重変化
  if (wNow > 0 && w6m > 0) {
    var diff6m = w6m - wNow;
    msgs.push('半年間の変化: ' + (diff6m > 0 ? '-' : '+') + Math.abs(diff6m).toFixed(1) + 'kg');
  }

  // 1年間の体重変化
  if (wNow > 0 && w1y > 0) {
    var diff1y = w1y - wNow;
    msgs.push('1年間の変化: ' + (diff1y > 0 ? '-' : '+') + Math.abs(diff1y).toFixed(1) + 'kg');
  }

  // 年齢による G8 年齢区分
  var age = parseInt(getVal('patient_age', 0));
  if (age > 0) {
    var g8age;
    if (age >= 86) g8age = 0;
    else if (age >= 80) g8age = 1;
    else g8age = 2;
    nurseData.g8_age = g8age;
  }

  var calcEl = document.getElementById('weightCalcResult');
  if (calcEl) {
    calcEl.innerHTML = msgs.length
      ? '<strong>計算結果:</strong><br>' + msgs.map(function(m) { return '\u30FB' + m; }).join('<br>')
      : '<span style="color:#e74c3c;">身長・体重を入力してください</span>';
  }
  var fillEl = document.getElementById('autoFillResult');
  if (fillEl) {
    fillEl.innerHTML = filled.length
      ? '<strong style="color:#27ae60;">自動反映済み:</strong><br>' + filled.map(function(f) { return '\u2713 ' + f; }).join('<br>')
      : '';
  }

  // BMI表示更新
  var bmiDisp = document.getElementById('bmiDisplay');
  if (bmiDisp && nurseData.patient_bmi) bmiDisp.textContent = nurseData.patient_bmi;
}

function autoJudgeFried() {
  saveCurrentStep();
  var msgs = [];

  // 握力
  var sex = getVal('patient_sex');
  var gripR = parseFloat(getVal('fried_grip_r', 0));
  var gripL = parseFloat(getVal('fried_grip_l', 0));
  var gripMax = Math.max(gripR, gripL);
  if (gripMax > 0 && sex) {
    var th = sex === 'M' ? 28 : 18;
    var result = gripMax < th ? 1 : 0;
    nurseData.fried_grip = result;
    msgs.push('握力: 最大' + gripMax + 'kg（基準' + th + 'kg）\u2192 ' + (result ? '該当' : '非該当'));
  }

  // 歩行速度
  var speed = parseFloat(getVal('fried_walk_speed', 0));
  if (speed > 0) {
    var walkResult = speed < 1.0 ? 1 : 0;
    nurseData.fried_walk = walkResult;
    msgs.push('歩行速度: ' + speed + ' m/秒（基準1.0）\u2192 ' + (walkResult ? '該当' : '非該当'));
  }

  var el = document.getElementById('friedAutoResult');
  if (el) {
    el.innerHTML = msgs.length
      ? '<strong style="color:#27ae60;">自動判定結果:</strong><br>' + msgs.map(function(m) { return '\u2713 ' + m; }).join('<br>')
      : '<span style="color:#e74c3c;">性別・握力・歩行速度を入力してください</span>';
  }

  renderStep();
}

function autoJudgeFriedSilent() {
  var sex = getVal('patient_sex');
  var gripR = parseFloat(getVal('fried_grip_r', 0));
  var gripL = parseFloat(getVal('fried_grip_l', 0));
  var gripMax = Math.max(gripR, gripL);
  if (gripMax > 0 && sex) {
    var th = sex === 'M' ? 28 : 18;
    nurseData.fried_grip = gripMax < th ? 1 : 0;
  }
  var speed = parseFloat(getVal('fried_walk_speed', 0));
  if (speed > 0) {
    nurseData.fried_walk = speed < 1.0 ? 1 : 0;
  }
}

// =========================================================================
// localStorage保存
// =========================================================================
function saveToLocalStorage() {
  saveCurrentStep();
  recalcAll();

  var pid = getVal('patient_id');
  if (!pid) { alert('患者IDを入力してください'); return; }

  var data = {
    patient_id: pid,
    input_type: 'nurse',
    input_timestamp: new Date().toISOString(),
    patient_name: getVal('patient_name'),
    patient_age: getVal('patient_age'),
    patient_sex: getVal('patient_sex'),
    patient_height: getVal('patient_height'),
    patient_weight: getVal('patient_weight'),
    patient_bmi: getVal('patient_bmi'),
    weight_3m: getVal('weight_3m'),
    weight_6m: getVal('weight_6m'),
    weight_1y: getVal('weight_1y'),
    assessment_date: getVal('assessment_date'),
    cga_social: getVal('cga_social'),
    g8_c: getVal('g8_c'),
    g8_e: getVal('g8_e'),
    g8_h: getVal('g8_h'),
    g8_drug_count: getVal('g8_drug_count'),
    g8_f: getVal('g8_f'),
    g8_age: getVal('g8_age'),
    cfs_score: getVal('cfs_score'),
    fried_grip_r: getVal('fried_grip_r'),
    fried_grip_l: getVal('fried_grip_l'),
    fried_grip: nurseData.fried_grip !== undefined ? String(nurseData.fried_grip) : '',
    fried_walk_speed: getVal('fried_walk_speed'),
    fried_walk: nurseData.fried_walk !== undefined ? String(nurseData.fried_walk) : '',
    glim_calf: getVal('glim_calf'),
    minicog_recall: getVal('minicog_recall'),
    minicog_clock: getVal('minicog_clock'),
    _minicog_score: nurseData._minicog_score,
    _minicog_judge: nurseData._minicog_judge || '',
    iadl_0: getVal('iadl_0'),
    iadl_1: getVal('iadl_1'),
    iadl_2: getVal('iadl_2'),
    iadl_3: getVal('iadl_3'),
    iadl_4: getVal('iadl_4'),
    iadl_5: getVal('iadl_5'),
    iadl_6: getVal('iadl_6'),
    iadl_7: getVal('iadl_7'),
    _iadl_score: nurseData._iadl_score,
    _iadl_judge: nurseData._iadl_judge || '',
  };

  var key = 'assessment_nurse_' + pid;
  localStorage.setItem(key, JSON.stringify(data));

  var el = document.getElementById('saveResult');
  if (el) {
    el.innerHTML = '<span style="color:#27ae60; font-weight:700; font-size:16px;">保存完了しました</span>' +
      '<br><span style="font-size:12px; color:var(--text-light);">キー: ' + key + ' / 保存時刻: ' + new Date().toLocaleString('ja-JP') + '</span>';
  }
}

buildSidebar();
renderStep();
</script>
