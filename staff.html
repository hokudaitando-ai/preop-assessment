<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2c3e50">
<link rel="manifest" href="manifest.json">
<title>術前全身状態評価（医療者用）</title>
<style>
:root {
  --primary: #2c3e50;
  --primary-accent: #3498db;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --bg: #f5f6fa;
  --card: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #dcdfe3;
  --sidebar-w: 230px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
}

/* サイドバー */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: 240px;
  height: 100vh;
  background: var(--primary);
  color: #ecf0f1;
  overflow-y: auto;
  z-index: 200;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}
.sidebar.open { transform: translateX(0); }
.sidebar-title {
  padding: 18px 16px 10px;
  font-size: 14px;
  font-weight: 700;
  border-bottom: 1px solid #3d566e;
  text-align: center;
}
.sidebar-nav { list-style: none; padding: 6px 0; }
.sidebar-nav li {
  padding: 9px 16px;
  font-size: 12.5px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}
.sidebar-nav li:hover { background: #34495e; }
.sidebar-nav li.active {
  background: var(--primary-accent);
  border-left-color: #fff;
  font-weight: 700;
}
.sidebar-nav li.done {
  color: #82e0aa;
}
.sidebar-nav li.done::before { content: "✓ "; }

/* メイン */
.main {
  margin-left: 0;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ヘッダー */
.top-bar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar h1 { font-size: 16px; color: var(--primary); }
.patient-badge {
  background: var(--primary-accent);
  color: #fff;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 13px;
}

/* コンテンツ */
.content { padding: 20px 28px; max-width: 900px; }
.step { display: none; }
.step.active { display: block; }

/* セクションヘッダー */
.section-hd {
  background: var(--primary-accent);
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px 8px 0 0;
  font-size: 15px;
  font-weight: 700;
  margin-top: 18px;
}
.section-desc {
  background: #eaf2f8;
  padding: 10px 18px;
  font-size: 12.5px;
  color: #555;
  border-radius: 0 0 8px 8px;
  margin-bottom: 12px;
}

/* カード */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
}

/* 質問 */
.q-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; }

/* ラジオ */
.radio-group { display: flex; flex-direction: column; gap: 4px; }
.radio-opt {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}
.radio-opt:hover { background: #f0f4f8; }
.radio-opt.selected { background: #d6eaf8; }
.radio-opt input { margin-right: 8px; accent-color: var(--primary-accent); }

/* チェックボックス */
.check-opt {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
}
.check-opt input { margin-right: 8px; width: 16px; height: 16px; accent-color: var(--primary-accent); }

/* 入力フィールド */
.field-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}
.field-row label {
  width: 140px;
  font-size: 13px;
  font-weight: 500;
  text-align: right;
  padding-right: 10px;
  flex-shrink: 0;
}
.field-row input, .field-row select {
  padding: 7px 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 260px;
  outline: none;
}
.field-row input:focus, .field-row select:focus { border-color: var(--primary-accent); }

/* スコア表示 */
.score-box {
  background: #eaf2f8;
  border: 1px solid #b8d4e8;
  border-radius: 8px;
  padding: 14px 18px;
  margin: 12px 0;
}
.score-val { font-size: 18px; font-weight: 700; color: var(--primary-accent); }
.score-judge { font-size: 14px; font-weight: 600; margin-top: 4px; }

.judge-normal { color: var(--success); }
.judge-warning { color: var(--warning); }
.judge-danger { color: var(--danger); }

/* 患者データ取得バッジ */
.patient-data-badge {
  display: inline-block;
  background: #d5f5e3;
  color: #1e8449;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
}
.nurse-data-badge {
  display: inline-block;
  background: #d6eaf8;
  color: #1a5276;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
}

/* サマリーテーブル */
.summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.summary-table th {
  background: #d5e8f0;
  padding: 8px 10px;
  text-align: left;
  font-weight: 600;
}
.summary-table td { padding: 7px 10px; border-bottom: 1px solid #eee; }

/* ボタン */
.btn {
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-primary { background: var(--primary-accent); color: #fff; }
.btn-primary:hover { background: #2980b9; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #229954; }
.btn-secondary { background: #bdc3c7; color: #fff; }
.btn-secondary:hover { background: #95a5a6; }
.btn-calc { background: #8e44ad; color: #fff; }
.btn-calc:hover { background: #7d3c98; }

.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

textarea {
  width: 100%;
  padding: 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  resize: vertical;
  font-family: inherit;
}

/* ===== Mini-Cog 専用スタイル ===== */
.mc-sub { display: none; }
.mc-sub.mc-active { display: block; }

.role-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 14px;
  font-weight: 700;
}
.role-banner .role-icon { font-size: 22px; flex-shrink: 0; }
.role-banner .role-sub { font-size: 11px; font-weight: 400; margin-top: 2px; opacity: 0.85; }
.role-nurse { background: #eaf2fb; border: 2px solid #5b9bd5; color: #1a5276; }
.role-patient { background: #fef5e7; border: 2px solid #f5b041; color: #7e5109; }
.role-both { background: #eafaf1; border: 2px solid #58d68d; color: #1e8449; }

.handoff-notice {
  text-align: center;
  background: linear-gradient(135deg, #f39c12, #e67e22);
  color: #fff;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 14px;
}
.handoff-notice .handoff-title { font-size: 16px; font-weight: 700; }
.handoff-notice .handoff-desc { font-size: 12px; opacity: 0.9; margin-top: 3px; }

.takeback-notice {
  text-align: center;
  background: linear-gradient(135deg, #3498db, #2980b9);
  color: #fff;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 14px;
}
.takeback-notice .handoff-title { font-size: 16px; font-weight: 700; }
.takeback-notice .handoff-desc { font-size: 12px; opacity: 0.9; margin-top: 3px; }

.mc-word-display {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 16px 0;
}
.mc-word-chip {
  background: var(--primary-accent);
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 14px;
  box-shadow: 0 3px 10px rgba(52,152,219,0.3);
}

.mc-instruction {
  background: #fff3cd;
  border: 1px solid #ffc107;
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.7;
}
.mc-instruction strong { color: #856404; }

.mc-canvas-wrap { text-align: center; margin: 12px 0; }
.mc-canvas-wrap canvas {
  border: 3px solid var(--border);
  border-radius: 10px;
  background: #fff;
  touch-action: none;
  cursor: crosshair;
}
.mc-canvas-controls {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
}
.mc-pen-sizes {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 6px 0;
}
.mc-pen-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.mc-pen-btn.active { border-color: var(--primary-accent); background: #eaf2f8; }
.mc-pen-dot { border-radius: 50%; background: #333; }

.mc-timer-badge {
  display: inline-block;
  background: #fff3cd;
  color: #856404;
  font-size: 15px;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 18px;
  margin: 8px 0;
}

.mc-sub-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.mc-progress {
  text-align: center;
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 12px;
}

.mc-cdt-guide {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin: 10px 0;
}
.mc-cdt-item {
  background: #f8f9fa;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
}
.mc-cdt-item .chk { color: var(--success); font-weight: 700; }

.mc-score-big {
  font-size: 56px;
  font-weight: 800;
  text-align: center;
  line-height: 1;
}
.mc-score-label {
  text-align: center;
  font-size: 14px;
  color: var(--text-light);
  margin-top: 2px;
}
.mc-score-breakdown {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 14px 0;
}
.mc-score-item { text-align: center; }
.mc-score-item .num { font-size: 24px; font-weight: 700; }
.mc-score-item .lbl { font-size: 11px; color: var(--text-light); }

.mc-judge-badge {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}
.mc-judge-ok { background: var(--success); }
.mc-judge-ng { background: var(--danger); }

.mc-clock-thumb { margin: 12px auto; max-width: 220px; }
.mc-clock-thumb img { width: 100%; border-radius: 10px; border: 2px solid var(--border); }

.mc-radio-group { display: flex; flex-direction: column; gap: 5px; }
.mc-radio-opt {
  display: flex;
  align-items: center;
  background: #eaf2f8;
  border: 2px solid transparent;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.mc-radio-opt:hover { border-color: var(--primary-accent); }
.mc-radio-opt.selected { border-color: var(--primary-accent); background: #d6eaf8; }
.mc-radio-opt input[type="radio"] { width: 18px; height: 18px; margin-right: 10px; accent-color: var(--primary-accent); }

.mc-wl-radio { display: flex; flex-direction: column; gap: 4px; }
.mc-wl-opt {
  display: flex; align-items: center;
  padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  border: 2px solid transparent; transition: all 0.15s;
}
.mc-wl-opt:hover { background: #f0f4f8; }
.mc-wl-opt.selected { border-color: var(--primary-accent); background: #d6eaf8; }
.mc-wl-opt input { margin-right: 8px; accent-color: var(--primary-accent); }

/* タッチ操作最適化 */
input, select, textarea, button { font-size: 16px; }
textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 14px; font-family: inherit; }

/* === タブレット最適化 === */
/* ハンバーガーボタン常時表示 */
.menu-toggle { display: block !important; }

/* サイドバーナビのタッチ最適化 */
.sidebar-nav li { padding: 12px 16px; font-size: 14px; min-height: 48px; display: flex; align-items: center; }

@media (max-width: 1024px) {
  .content { padding: 16px 20px; }
  .radio-opt { padding: 10px 12px; font-size: 14px; min-height: 44px; }
  .check-opt { padding: 10px 12px; font-size: 14px; min-height: 44px; }
  .check-opt input { width: 20px; height: 20px; }
  .radio-opt input { width: 18px; height: 18px; }
  .q-label { font-size: 14px; }
  .field-row input, .field-row select { font-size: 16px; padding: 10px 12px; }
  .field-row label { font-size: 14px; }
  .btn { min-height: 48px; font-size: 15px; }
  .section-hd { font-size: 16px; padding: 12px 18px; }
}
@media (max-width: 768px) {
  .top-bar { padding: 10px 16px; }
  .content { padding: 12px 16px; }
  .field-row { flex-direction: column; align-items: flex-start; }
  .field-row label { width: auto; text-align: left; padding-right: 0; margin-bottom: 4px; }
  .field-row input, .field-row select { width: 100%; }
}
.sidebar-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 199;
}
.sidebar.open + .sidebar-backdrop,
.sidebar.open ~ .sidebar-backdrop { display: block; }
</style>
</head>
<body>

<!-- サイドバー -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-title">術前全身状態評価</div>
  <ul class="sidebar-nav" id="sidebarNav"></ul>
</div>
<div class="sidebar-backdrop" onclick="closeSidebar()"></div>

<!-- メイン -->
<div class="main">
  <div class="top-bar">
    <button class="menu-toggle" onclick="toggleSidebar()" style="background:none; border:none; font-size:24px; cursor:pointer; padding:4px 8px; color:var(--primary);">&#9776;</button>
    <h1>医療者用 評価入力</h1>
    <div>
      <span class="patient-badge" id="topPatientId">患者未選択</span>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script>
// =========================================================================
// ステップ定義
// =========================================================================
const STEPS = [
  { id: 'info',    name: '1. 患者基本情報' },
  { id: 'g8',      name: '2. G8' },
  { id: 'cfs',     name: '3. CFS' },
  { id: 'fried',   name: '4. 改訂J-CHS' },
  { id: 'minicog', name: '5. Mini-Cog' },
  { id: 'iadl',    name: '6. Lawton IADL' },
  { id: 'mfi5',    name: '7. mFI-5' },
  { id: 'extra',   name: '8. 追加評価' },
  { id: 'summary', name: '9. 結果サマリー' },
];

let currentStep = 0;
let completedSteps = new Set();
let staffData = {};     // 医療者入力データ
let patientData = null; // 患者入力データ（localStorageから読み込み）
let nurseData = null;   // 看護師入力データ（localStorageから読み込み）

// =========================================================================
// サイドバー開閉
// =========================================================================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

// =========================================================================
// サイドバー
// =========================================================================
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = STEPS.map((s, i) =>
    `<li data-idx="${i}" onclick="goStep(${i}); closeSidebar();">${s.name}</li>`
  ).join('');
  updateSidebar();
}

function updateSidebar() {
  document.querySelectorAll('.sidebar-nav li').forEach((li, i) => {
    li.classList.toggle('active', i === currentStep);
    li.classList.toggle('done', completedSteps.has(i));
  });
}

// =========================================================================
// ステップ切り替え
// =========================================================================
function goStep(n) {
  saveCurrentStep();
  currentStep = n;
  renderStep();
  updateSidebar();
  window.scrollTo({top: 0});
}

function nextStep() {
  saveCurrentStep();
  completedSteps.add(currentStep);
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
    updateSidebar();
    window.scrollTo({top: 0});
  } else {
    exportCSV();
  }
}

function prevStep() {
  saveCurrentStep();
  if (currentStep > 0) { currentStep--; renderStep(); updateSidebar(); window.scrollTo({top: 0}); }
}

// =========================================================================
// データ保存・読み込み
// =========================================================================
function saveCurrentStep() {
  // ラジオ
  document.querySelectorAll('.radio-group[data-key]').forEach(g => {
    const c = g.querySelector('input:checked');
    if (c) staffData[g.dataset.key] = c.value;
  });
  // チェックボックス
  document.querySelectorAll('.check-opt input[type="checkbox"]').forEach(cb => {
    staffData[cb.dataset.key] = cb.checked ? 1 : 0;
  });
  // テキスト入力（チェックボックスは除外）
  document.querySelectorAll('input[data-key]:not([type="checkbox"])').forEach(inp => {
    staffData[inp.dataset.key] = inp.value;
  });
  document.querySelectorAll('select[data-key]').forEach(sel => {
    staffData[sel.dataset.key] = sel.value;
  });
  // テキストエリア
  document.querySelectorAll('textarea[data-key]').forEach(ta => {
    staffData[ta.dataset.key] = ta.value;
  });
}

function loadPatientData(pid) {
  const key = 'assessment_patient_' + pid;
  const raw = localStorage.getItem(key);
  if (raw) {
    patientData = JSON.parse(raw);
    return true;
  }
  patientData = null;
  return false;
}

function loadNurseData(pid) {
  const key = 'assessment_nurse_' + pid;
  const raw = localStorage.getItem(key);
  if (raw) {
    nurseData = JSON.parse(raw);
    return true;
  }
  nurseData = null;
  return false;
}

function getVal(key, fallback) {
  if (staffData[key] !== undefined && staffData[key] !== '') return staffData[key];
  if (nurseData && nurseData[key] !== undefined && nurseData[key] !== '') return nurseData[key];
  if (patientData && patientData[key] !== undefined && patientData[key] !== '') return patientData[key];
  return fallback !== undefined ? fallback : '';
}

function isPatientVal(key) {
  return patientData && patientData[key] !== undefined && patientData[key] !== ''
    && (staffData[key] === undefined || staffData[key] === '')
    && (!nurseData || nurseData[key] === undefined || nurseData[key] === '');
}

function isNurseVal(key) {
  return nurseData && nurseData[key] !== undefined && nurseData[key] !== ''
    && (staffData[key] === undefined || staffData[key] === '');
}

// =========================================================================
// HTML生成ヘルパー
// =========================================================================
function h_section(title, desc) {
  return `<div class="section-hd">${title}</div>` +
    (desc ? `<div class="section-desc">${desc}</div>` : '');
}

function dataBadge(key) {
  if (isNurseVal(key)) return '<span class="nurse-data-badge">看護師入力</span>';
  if (isPatientVal(key)) return '<span class="patient-data-badge">患者入力</span>';
  return '';
}

function h_field(key, label, opts) {
  opts = opts || {};
  const val = getVal(key, opts.def || '');
  const badge = dataBadge(key);
  const type = opts.type || 'text';
  const w = opts.width || '260px';
  return `<div class="field-row">
    <label>${label}${badge}</label>
    <input type="${type}" data-key="${key}" value="${val}" style="width:${w}" ${opts.placeholder ? 'placeholder="'+opts.placeholder+'"' : ''}>
  </div>`;
}

function h_radio(key, label, options) {
  const curVal = getVal(key);
  const badge = dataBadge(key);
  let html = `<div class="card"><div class="q-label">${label}${badge}</div><div class="radio-group" data-key="${key}">`;
  for (const [text, val] of options) {
    const checked = String(curVal) === String(val) ? 'checked' : '';
    const sel = checked ? 'selected' : '';
    html += `<label class="radio-opt ${sel}"><input type="radio" name="${key}" value="${val}" ${checked}>${text}</label>`;
  }
  html += '</div></div>';
  return html;
}

function h_check(key, text) {
  const checked = getVal(key) == 1 ? 'checked' : '';
  return `<label class="check-opt"><input type="checkbox" data-key="${key}" ${checked}>${text}</label>`;
}

function h_score(id) {
  return `<div class="score-box" id="score_${id}">
    <div class="score-val" id="scoreVal_${id}">スコア: 未計算</div>
    <div class="score-judge" id="scoreJudge_${id}"></div>
    <button class="btn btn-calc btn-sm" onclick="calcScore('${id}')" style="margin-top:8px;">スコア計算</button>
  </div>`;
}

function h_nav() {
  const isFirst = currentStep === 0;
  const isLast = currentStep === STEPS.length - 1;
  let html = `<div class="nav-bar">
    <button class="btn btn-secondary" onclick="prevStep()" ${isFirst ? 'disabled' : ''}>◀ 前へ</button>
    <span style="font-size:12px; color:var(--text-light);">${currentStep + 1} / ${STEPS.length}</span>
    <button class="btn ${isLast ? 'btn-success' : 'btn-primary'}" onclick="nextStep()">${isLast ? 'CSV出力' : '次へ ▶'}</button>
  </div>`;
  if (isFirst || isLast) {
    html += `<div style="text-align:center; margin-top:12px;">
      <button class="btn btn-secondary" onclick="location.href='index.html'" style="font-size:13px; padding:8px 20px;">◀ トップに戻る</button>
    </div>`;
  }
  return html;
}

// =========================================================================
// 各ステップのレンダリング
// =========================================================================
function renderStep() {
  const el = document.getElementById('content');
  const renderers = [
    renderInfo, renderG8, renderCFS, renderFried,
    renderMiniCog, renderIADL, renderMFI5, renderExtra, renderSummary
  ];
  el.innerHTML = renderers[currentStep]() + h_nav();

  // ラジオのスタイル
  el.querySelectorAll('.radio-group input').forEach(r => {
    r.addEventListener('change', function() {
      this.closest('.radio-group').querySelectorAll('.radio-opt').forEach(o => o.classList.remove('selected'));
      this.closest('.radio-opt').classList.add('selected');
    });
  });

}

// ---- Step 1: G8 ----
function renderG8() {
  let html = h_section('G8スクリーニング（Geriatric-8）', '17点満点。14点以下で「脆弱（異常）」→ 詳細CGAが必要。');
  html += h_radio('g8_a', 'A. 過去3ヶ月間の食事摂取量の変化', [
    ['著しい減少 (0)', 0], ['中等度の減少 (1)', 1], ['減少なし (2)', 2]
  ]);
  const w3mNote = staffData.g8_b !== undefined ? ' <span style="color:#8e44ad; font-size:11px;">← 体重履歴から自動反映済</span>' : '';
  html += h_radio('g8_b', 'B. 過去3ヶ月間の体重変化' + w3mNote, [
    ['3kg以上の減少 (0)', 0], ['わからない (1)', 1], ['1-3kgの減少 (2)', 2], ['減少なし (3)', 3]
  ]);
  html += h_radio('g8_c', 'C. 可動性（Mobility）', [
    ['寝たきり/車椅子 (0)', 0], ['離床可・外出不可 (1)', 1], ['外出可能 (2)', 2]
  ]);
  html += h_radio('g8_e', 'E. 神経・精神的問題', [
    ['重度認知症/うつ (0)', 0], ['中等度認知障害 (1)', 1], ['問題なし (2)', 2]
  ]);
  const bmiNote = staffData.g8_f !== undefined ? ` <span style="color:#8e44ad; font-size:11px;">← BMI ${getVal('patient_bmi','?')} から自動反映済</span>` : '';
  html += h_radio('g8_f', 'F. BMI' + bmiNote, [
    ['19未満 (0)', 0], ['19-21 (1)', 1], ['21-23 (2)', 2], ['23以上 (3)', 3]
  ]);
  html += h_radio('g8_h', 'H. 1日4種類以上の処方薬', [
    ['はい (0)', 0], ['いいえ (1)', 1]
  ]);
  html += h_radio('g8_p', 'P. 同年齢と比較した自己健康評価', [
    ['良くない (0)', 0], ['わからない (0.5)', 0.5], ['同等 (1)', 1], ['良い (2)', 2]
  ]);
  // 年齢自動判定
  const age = parseInt(getVal('patient_age', 0));
  if (age > 0) {
    let g8age;
    if (age >= 86) g8age = 0;
    else if (age >= 80) g8age = 1;
    else g8age = 2;
    staffData.g8_age = g8age;
  }
  const ageNote = age > 0 ? ` <span style="color:#8e44ad; font-size:11px;">← ${age}歳 → 自動選択</span>` : '';
  html += h_radio('g8_age', '年齢区分' + ageNote, [
    ['86歳以上 (0)', 0], ['80-85歳 (1)', 1], ['80歳未満 (2)', 2]
  ]);
  html += h_score('g8');
  return html;
}

    ['5: Mildly Frail - IADL一部に介助必要', 5],
    ['6: Moderately Frail - 入浴・屋外・階段に介助必要', 6],

// ---- Step 3: Fried ----
function renderFried() {
  let html = h_section('改訂J-CHS基準（身体的フレイル）',
    'Satake S & Arai H, 2020 に準拠。5項目中3つ以上でフレイル、1-2でプレフレイル、0で健常。');

  // 1. 体重減少（半年前体重から自動判定）
  const w6m = parseFloat(getVal('weight_6m', 0));
  const wNow = parseFloat(getVal('patient_weight', 0));
  let wtAutoMsg = '';
  if (w6m > 0 && wNow > 0) {
    const diff6m = w6m - wNow;
    const friedWtAuto = diff6m >= 2 ? 1 : 0;
    staffData.fried_wt = friedWtAuto;
    wtAutoMsg = ` <span style="color:#8e44ad; font-size:11px;">← 自動判定: ${diff6m >= 0 ? '-' : '+'}${Math.abs(diff6m).toFixed(1)}kg（${friedWtAuto ? '該当' : '非該当'}）</span>`;
  }
  html += h_radio('fried_wt', '1. 体重減少' + wtAutoMsg, [
    ['該当しない：6ヶ月間で2kg以上の意図しない体重減少なし (0)', 0],
    ['該当する：6ヶ月間で2kg以上の意図しない体重減少あり (1)', 1]
  ]);

  // 2. 筋力低下（握力：右・左入力 → 性別で自動判定）
  const sex = getVal('patient_sex');
  const gripR = parseFloat(getVal('fried_grip_r', 0));
  const gripL = parseFloat(getVal('fried_grip_l', 0));
  const gripMax = Math.max(gripR, gripL);
  let gripAutoMsg = '';
  if (gripMax > 0 && sex) {
    const threshold = sex === 'M' ? 28 : 18;
    const gripResult = gripMax < threshold ? 1 : 0;
    staffData.fried_grip = gripResult;
    gripAutoMsg = ` <span style="color:#8e44ad; font-size:11px;">← 自動判定: 最大${gripMax}kg（${sex === 'M' ? '男性' : '女性'}基準${threshold}kg ${gripResult ? '未満→該当' : '以上→非該当'}）</span>`;
  }
  html += `<div class="card"><div class="q-label">2. 筋力低下（握力）${gripAutoMsg}</div>
    <div class="field-row" style="margin-top:8px;">
      <label>右手握力 (kg):</label>
      <input type="number" data-key="fried_grip_r" value="${getVal('fried_grip_r')}" style="width:100px; padding:7px 10px; font-size:13px; border:1px solid var(--border); border-radius:6px;" step="0.1">
    </div>
    <div class="field-row">
      <label>左手握力 (kg):</label>
      <input type="number" data-key="fried_grip_l" value="${getVal('fried_grip_l')}" style="width:100px; padding:7px 10px; font-size:13px; border:1px solid var(--border); border-radius:6px;" step="0.1">
    </div>
    <div style="margin:6px 0 0 150px; font-size:11px; color:#7d3c98;">基準：男性 28kg未満、女性 18kg未満で該当（最大値で判定）</div>
    <div class="radio-group" data-key="fried_grip" style="margin-top:8px;">
      <label class="radio-opt ${String(getVal('fried_grip'))==='0'?'selected':''}"><input type="radio" name="fried_grip" value="0" ${String(getVal('fried_grip'))==='0'?'checked':''}>該当しない (0)</label>
      <label class="radio-opt ${String(getVal('fried_grip'))==='1'?'selected':''}"><input type="radio" name="fried_grip" value="1" ${String(getVal('fried_grip'))==='1'?'checked':''}>該当する (1)</label>
    </div>
  </div>`;

  // 3. 疲労感
  html += h_radio('fried_exhaust', '3. 疲労感', [
    ['該当しない：「わけもなく疲れたような感じがする」に「いいえ」 (0)', 0],
    ['該当する：「（ここ2週間）わけもなく疲れたような感じがする」に「はい」 (1)', 1]
  ]);

  // 4. 歩行速度
  html += `<div class="card"><div class="q-label">4. 通常歩行速度</div>
    <div class="field-row" style="margin-top:8px;">
      <label>歩行速度 (m/秒):</label>
      <input type="number" data-key="fried_walk_speed" value="${getVal('fried_walk_speed')}" style="width:120px; padding:7px 10px; font-size:13px; border:1px solid var(--border); border-radius:6px;" step="0.01" placeholder="例: 0.85">
    </div>
    <div style="margin:6px 0 0 150px; font-size:11px; color:#7d3c98;">基準：1.0 m/秒未満で該当</div>
    <div class="radio-group" data-key="fried_walk" style="margin-top:8px;">
      <label class="radio-opt ${String(getVal('fried_walk'))==='0'?'selected':''}"><input type="radio" name="fried_walk" value="0" ${String(getVal('fried_walk'))==='0'?'checked':''}>該当しない：1.0 m/秒以上 (0)</label>
      <label class="radio-opt ${String(getVal('fried_walk'))==='1'?'selected':''}"><input type="radio" name="fried_walk" value="1" ${String(getVal('fried_walk'))==='1'?'checked':''}>該当する：1.0 m/秒未満 (1)</label>
    </div>
  </div>`;

  // 5. 身体活動
  // 身体活動の自動判定（患者アンケートから）
  const q1 = getVal('fried_activity_q1');
  const q2 = getVal('fried_activity_q2');
  if (q1 !== '' && q2 !== '' && (staffData.fried_activity === undefined || staffData.fried_activity === '')) {
    staffData.fried_activity = (parseInt(q1) === 1 && parseInt(q2) === 1) ? 1 : 0;
  }
  let actAutoMsg = '';
  if (q1 !== '' && q2 !== '') {
    const q1Label = parseInt(q1) === 1 ? 'していない' : 'している';
    const q2Label = parseInt(q2) === 1 ? 'していない' : 'している';
    actAutoMsg = ` <span style="color:#8e44ad; font-size:11px;">← 患者回答: 軽い運動=${q1Label}, 定期的運動=${q2Label} → 自動判定</span>`;
  }
  html += h_radio('fried_activity', '5. 身体活動' + actAutoMsg, [
    ['該当しない：軽い運動・体操 or 定期的な運動・スポーツを週1回以上している (0)', 0],
    ['該当する：「軽い運動・体操」「定期的な運動・スポーツ」いずれも週1回もしていない (1)', 1]
  ]);

  html += `<button class="btn btn-calc btn-sm" onclick="autoJudgeFried()" style="margin:12px 0;">握力・歩行速度・体重から自動判定を更新</button>`;
  html += `<div id="friedAutoResult" style="font-size:12px; margin-bottom:8px;"></div>`;
  html += h_score('fried');
  return html;
}

// ---- Step 4: mFI-5 ----
function renderMFI5() {
  let html = h_section('改訂フレイル指数 mFI-5', '5項目の併存疾患。2項目以上でフレイル。');

  // IADL判定結果から機能的自立を自動提示
  const iadlScore = staffData._iadl_score;
  let iadlHint = '';
  if (iadlScore !== undefined) {
    const funcDependent = iadlScore <= 5 ? 1 : 0;
    iadlHint = funcDependent
      ? `<span style="color:#e74c3c; font-size:12px;">（Lawton IADL ${iadlScore}/8 → 非自立の可能性あり）</span>`
      : `<span style="color:#27ae60; font-size:12px;">（Lawton IADL ${iadlScore}/8 → 概ね自立）</span>`;
  }

  html += '<div class="card"><div class="q-label">該当項目にチェック</div>';
  html += h_check('mfi5_chf', 'うっ血性心不全の既往');
  html += h_check('mfi5_dm', '糖尿病（インスリン or 経口薬）');
  html += h_check('mfi5_copd', 'COPD / 肺炎の既往');
  html += h_check('mfi5_func', '機能的に非自立（部分的 or 完全依存）');
  html += `<div style="margin:-2px 0 6px 34px; font-size:11px; color:#7d3c98;">※ Lawton IADLの判定結果に基づいて入力してください ${iadlHint}</div>`;
  html += h_check('mfi5_htn', '高血圧（薬物療法を要する）');
  html += '</div>';
  html += h_score('mfi5');
  return html;
}

// ---- Step 8: 追加評価（MNA-SF / GLIM / E-PASS / CGA の未収集項目のみ） ----
function renderExtra() {
  let html = h_section('追加評価（MNA-SF / GLIM / E-PASS / CGA）',
    '前ステップで未収集の項目のみをまとめています。入力するとサマリーで各スコアが自動算出されます。未入力でもスキップ可能です。');

  // ================================================================

  html += '<div class="section-hd" style="background:#e67e22; margin-top:16px;">MNA-SF 追加項目</div>';
  html += '<div class="section-desc">A(食事量)=G8 A, B(体重変化)=G8 B, C(可動性)=G8 C, E(神経精神)=G8 E, F(BMI)=G8 F から自動流用。以下のみ追加入力。</div>';

  html += '<div class="section-hd" style="background:#c0392b; margin-top:16px;">GLIM基準 追加項目</div>';
  html += '<div class="section-desc">体重減少・低BMI は体重履歴から自動判定。食事摂取低下は G8 A から流用。以下のみ追加入力。</div>';

  html += `<div class="card"><div class="q-label">下腿周囲長（ふくらはぎ周囲長）</div>
    <div class="field-row" style="margin-top:6px;">
      <label>下腿周囲長 (cm):</label>

    <div style="margin:4px 0 0 150px; font-size:11px; color:#7d3c98;">基準：男性 &lt; 34cm、女性 &lt; 33cm で骨格筋量減少と判定</div>
  </div>`;

  html += h_radio('glim_inflammation', '疾患による炎症（病因基準）', [
    ['なし (0)', 0],
    ['あり：がん・慢性心不全・COPD・慢性腎臓病・慢性炎症性疾患など (1)', 1]
  ]);

  // ================================================================
  // E-PASS 追加分（年齢=基本情報、糖尿病=mFI-5 DMから流用）
  // ================================================================
  html += '<div class="section-hd" style="background:#2c3e50; margin-top:16px;">E-PASS PRS 追加項目</div>';
  html += '<div class="section-desc">年齢は基本情報、糖尿病は mFI-5 から自動流用。以下のみ追加入力。</div>';

  html += h_radio('epass_heart', '重症心疾患（NYHA III度以上、等）', [
    ['なし (0)', 0], ['あり (1)', 1]
  ]);
  html += h_radio('epass_lung', '重症肺疾患（%VC&lt;60%、FEV1.0%&lt;50%、等）', [
    ['なし (0)', 0], ['あり (1)', 1]
  ]);
  html += h_radio('epass_ps', 'Performance Status（ECOG PS）', [
    ['PS 0：無症状、通常活動に制限なし (0)', 0],
    ['PS 1：軽度の症状あり、軽作業は可能 (1)', 1],
    ['PS 2：日中の50%以上は起居、身の回りは自分で可能 (2)', 2],
    ['PS 3：日中の50%以上は臥床、限られた身の回りのみ (3)', 3],

function mcGoSub(n) {

  document.querySelectorAll('.mc-sub').forEach(s => s.classList.remove('mc-active'));

  }
  if (n === 2) {

// === キャンバス ===
let mcCanvasReady = false;
function mcInitCanvas() {
  mcCanvas = document.getElementById('mcClockCanvas');
  if (!mcCanvas) return;
  mcCtx = mcCanvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 280;
  mcCanvas.width = size * dpr;
  mcCanvas.height = size * dpr;
  mcCanvas.style.width = size + 'px';
  mcCanvas.style.height = size + 'px';
  mcCtx.scale(dpr, dpr);
  mcDrawBase();
  mcStrokeHistory = [];
  mcSaveStroke();

  // イベントリスナーは1回だけ登録
  if (!mcCanvasReady) {
    mcCanvas.addEventListener('mousedown', mcOnStart);
    mcCanvas.addEventListener('mousemove', mcOnMove);
    mcCanvas.addEventListener('mouseup', mcOnEnd);
    mcCanvas.addEventListener('mouseleave', mcOnEnd);
    mcCanvas.addEventListener('touchstart', function(e) { e.preventDefault(); mcOnStart({clientX: e.touches[0].clientX, clientY: e.touches[0].clientY}); }, {passive:false});
    mcCanvas.addEventListener('touchmove', function(e) { e.preventDefault(); mcOnMove({clientX: e.touches[0].clientX, clientY: e.touches[0].clientY}); }, {passive:false});
    mcCanvas.addEventListener('touchend', mcOnEnd);
    mcCanvasReady = true;
  }
}

function mcDrawBase() {
  const s = 280, cx = s/2, cy = s/2, r = s/2 - 14;
  mcCtx.clearRect(0, 0, s, s);
  mcCtx.beginPath();
  mcCtx.arc(cx, cy, r, 0, Math.PI*2);
  mcCtx.strokeStyle = '#ccc';
  mcCtx.lineWidth = 2;
  mcCtx.stroke();
  mcCtx.beginPath();
  mcCtx.arc(cx, cy, 3, 0, Math.PI*2);
  mcCtx.fillStyle = '#ccc';
  mcCtx.fill();
}

function mcGetPos(e) {
  const r = mcCanvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function mcOnStart(e) {
  mcDrawing = true;
  const p = mcGetPos(e);
  mcCtx.beginPath();
  mcCtx.moveTo(p.x, p.y);
  mcCtx.strokeStyle = '#000';
  mcCtx.lineWidth = mcPenSize;
  mcCtx.lineCap = 'round';
  mcCtx.lineJoin = 'round';
}
function mcOnMove(e) {
  if (!mcDrawing) return;
  const p = mcGetPos(e);
  mcCtx.lineTo(p.x, p.y);
  mcCtx.stroke();
}
function mcOnEnd() {
  if (mcDrawing) { mcDrawing = false; mcSaveStroke(); }
}
function mcSaveStroke() {
  mcStrokeHistory.push(mcCtx.getImageData(0, 0, mcCanvas.width, mcCanvas.height));
  if (mcStrokeHistory.length > 50) mcStrokeHistory.shift();
}
function mcUndo() {
  if (mcStrokeHistory.length > 1) {
    mcStrokeHistory.pop();
    mcCtx.putImageData(mcStrokeHistory[mcStrokeHistory.length - 1], 0, 0);
  }
}
function mcClear() {
  if (!mcCanvas) return;
  const dpr = window.devicePixelRatio || 1;
  mcCtx.setTransform(1, 0, 0, 1, 0, 0);
  mcCtx.clearRect(0, 0, mcCanvas.width, mcCanvas.height);
  mcCtx.scale(dpr, dpr);
  mcDrawBase();
  mcStrokeHistory = [];
  mcSaveStroke();
}
function mcSetPen(size, btn) {
  mcPenSize = size;
  document.querySelectorAll('.mc-pen-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function mcFinishDraw() {
  if (mcCanvas) mcClockImage = mcCanvas.toDataURL('image/png');
  mcGoSub(3);
}

// === タイマー ===
function mcStartTimer() {
  mcStopTimer();
  mcUpdateTimer();
  mcTimerInterval = setInterval(() => { mcTimerSec++; mcUpdateTimer(); }, 1000);
}
function mcStopTimer() {
  if (mcTimerInterval) { clearInterval(mcTimerInterval); mcTimerInterval = null; }
}
function mcUpdateTimer() {
  const m = Math.floor(mcTimerSec / 60), s = mcTimerSec % 60;
  const el = document.getElementById('mcTimerBadge');
  if (el) el.textContent = `経過時間: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

    </table>
    ${mcClockImage ? `<div class="mc-clock-thumb" style="margin-top:12px;"><div class="q-label" style="text-align:center;">時計描画</div><img src="${mcClockImage}" alt="時計描画"></div>` : ''}

      <strong>判定基準：</strong> 合計 0〜2点 → 認知機能低下の疑いあり / 合計 3〜5点 → 疑いなし
    </div>

function judgeCls(j) {
  if (!j) return '';
  const danger = ['脆弱（異常）','フレイル','重度フレイル','低栄養','認知機能低下疑い','重度低下','高リスク','GLIM低栄養'];
  const warn = ['プレフレイル','低栄養のおそれ','境界域','中等度低下','中リスク'];
  if (danger.includes(j)) return 'judge-danger';
  if (warn.includes(j)) return 'judge-warning';
  return 'judge-normal';
}

// =========================================================================
// スコア計算
// =========================================================================
function calcScore(id) {
  saveCurrentStep();
  const valEl = document.getElementById('scoreVal_' + id);
  const judgeEl = document.getElementById('scoreJudge_' + id);
  if (!valEl) return;

  try {
    const calcs = { g8: calcG8, cfs: calcCFS, fried: calcFried, mfi5: calcMFI5,
      minicog: calcMiniCog, iadl: calcIADL, mnasf: calcMNASF, glim: calcGLIM, epass: calcEPASS };
    const result = calcs[id]();
    valEl.textContent = result.text;
    judgeEl.textContent = '判定: ' + result.judge;
    judgeEl.className = 'score-judge ' + judgeCls(result.judge);
  } catch(e) {
    valEl.textContent = 'エラー: 全項目を入力してください';
    judgeEl.textContent = '';
  }
}

function gv(k) { return parseFloat(getVal(k, 0)); }

function calcG8() {
  const t = gv('g8_a')+gv('g8_b')+gv('g8_c')+gv('g8_e')+gv('g8_f')+gv('g8_h')+gv('g8_p')+gv('g8_age');
  staffData._g8_score = t;
  const j = t <= 14 ? '脆弱（異常）' : '正常';
  staffData._g8_judge = j;
  return { text: `G8スコア: ${t} / 17`, judge: j };
}

function calcCFS() {
  const s = parseInt(getVal('cfs_score', 0));
  staffData._cfs_val = s;
  let j = '非フレイル';
  if (s >= 7) j = '重度フレイル';
  else if (s >= 5) j = 'フレイル';
  else if (s === 4) j = 'プレフレイル';
  staffData._cfs_judge = j;
  return { text: `CFS: ${s} / 9`, judge: j };
}

function autoJudgeFried() {
  saveCurrentStep();
  const msgs = [];

  // 体重減少（半年前）
  const w6m = parseFloat(getVal('weight_6m', 0));
  const wNow = parseFloat(getVal('patient_weight', 0));
  if (w6m > 0 && wNow > 0) {
    const diff = w6m - wNow;
    const result = diff >= 2 ? 1 : 0;
    staffData.fried_wt = result;
    msgs.push(`体重減少: ${diff >= 0 ? '-' : '+'}${Math.abs(diff).toFixed(1)}kg → ${result ? '該当' : '非該当'}`);
  }

  // 握力
  const sex = getVal('patient_sex');
  const gripR = parseFloat(getVal('fried_grip_r', 0));
  const gripL = parseFloat(getVal('fried_grip_l', 0));
  const gripMax = Math.max(gripR, gripL);
  if (gripMax > 0 && sex) {
    const th = sex === 'M' ? 28 : 18;
    const result = gripMax < th ? 1 : 0;
    staffData.fried_grip = result;
    msgs.push(`握力: 最大${gripMax}kg（基準${th}kg）→ ${result ? '該当' : '非該当'}`);
  }

  // 歩行速度
  const speed = parseFloat(getVal('fried_walk_speed', 0));
  if (speed > 0) {
    const result = speed < 1.0 ? 1 : 0;
    staffData.fried_walk = result;
    msgs.push(`歩行速度: ${speed} m/秒（基準1.0）→ ${result ? '該当' : '非該当'}`);
  }

  const el = document.getElementById('friedAutoResult');
  if (el) {
    el.innerHTML = msgs.length
      ? '<strong style="color:#27ae60;">自動判定結果:</strong><br>' + msgs.map(m => '✓ ' + m).join('<br>')
      : '<span style="color:#e74c3c;">性別・体重・握力・歩行速度を入力してください</span>';
  }

  // 画面を再描画して反映
  renderStep();
}

function calcFried() {
  const t = gv('fried_wt')+gv('fried_grip')+gv('fried_exhaust')+gv('fried_walk')+gv('fried_activity');
  staffData._fried_score = t;
  let j = '健常';
  if (t >= 3) j = 'フレイル';
  else if (t >= 1) j = 'プレフレイル';
  staffData._fried_judge = j;
  return { text: `改訂J-CHS: ${t} / 5項目`, judge: j };
}

function calcMFI5() {
  const t = gv('mfi5_chf')+gv('mfi5_dm')+gv('mfi5_copd')+gv('mfi5_func')+gv('mfi5_htn');
  staffData._mfi5_score = t;
  let j = '非フレイル';
  if (t >= 2) j = 'フレイル';
  else if (t === 1) j = 'プレフレイル';
  staffData._mfi5_judge = j;
  return { text: `mFI-5: ${t} / 5`, judge: j };
}

function calcMiniCog() {
  const t = gv('minicog_recall') + gv('minicog_clock');
  staffData._minicog_score = t;
  let j = '正常';
  if (t <= 2) j = '認知機能低下疑い';
  else if (t <= 3) j = '境界域';
  staffData._minicog_judge = j;
  return { text: `Mini-Cog: ${t} / 5`, judge: j };
}

function calcMNASF() {
  const t = gv('mnasf_a')+gv('mnasf_b')+gv('mnasf_c')+gv('mnasf_d')+gv('mnasf_e')+gv('mnasf_f');
  staffData._mnasf_score = t;
  let j = '栄養状態良好';
  if (t <= 7) j = '低栄養';
  else if (t <= 11) j = '低栄養のおそれ';
  staffData._mnasf_judge = j;
  return { text: `MNA-SF: ${t} / 14`, judge: j };
}

function calcGLIM() {
  const p = gv('glim_wt_loss')+gv('glim_low_bmi')+gv('glim_muscle');
  const e = gv('glim_intake')+gv('glim_inflammation');
  staffData._glim_pheno = p; staffData._glim_etio = e;
  const diag = (p >= 1 && e >= 1);
  const j = diag ? 'GLIM低栄養' : '低栄養なし';
  staffData._glim_judge = j;
  return { text: `GLIM: 表現型 ${p}/3, 病因 ${e}/2`, judge: j };
}

function calcIADL() {
  let t = 0;
  for (let i = 0; i < 8; i++) t += gv('iadl_' + i);
  staffData._iadl_score = t;
  let j = '概ね自立';
  if (t <= 3) j = '重度低下';
  else if (t <= 5) j = '中等度低下';
  staffData._iadl_judge = j;
  return { text: `IADL: ${t} / 8`, judge: j };
}

function calcEPASS() {
  const age = parseFloat(getVal('patient_age', 0));
  const prs = -0.0686 + 0.00345*age + 0.323*gv('epass_heart') + 0.205*gv('epass_lung')
    + 0.153*gv('epass_dm') + 0.148*gv('epass_ps') + 0.0666*gv('epass_asa');
  staffData._epass_prs = prs.toFixed(4);
  let j = '低リスク';
  if (prs >= 0.5) j = '高リスク';
  else if (prs >= 0.3) j = '中リスク';
  staffData._epass_judge = j;
  return { text: `E-PASS PRS: ${prs.toFixed(4)}`, judge: j };
}

// --- MNA-SF（G8から流用 + D のみ追加） ---
function calcMNASF() {
  // A=g8_a, B=g8_b, C=g8_c, D=mnasf_d(追加), E=g8_e, F=g8_f
  const t = gv('g8_a') + gv('g8_b') + gv('g8_c') + gv('mnasf_d') + gv('g8_e') + gv('g8_f');
  staffData._mnasf_score = t;
  let j = '栄養状態良好';
  if (t <= 7) j = '低栄養';
  else if (t <= 11) j = '低栄養のおそれ';
  staffData._mnasf_judge = j;
  return { text: `MNA-SF: ${t} / 14`, judge: j };
}

// --- GLIM（体重履歴・BMI・G8 A + 追加項目から自動判定） ---
function calcGLIM() {
  let pheno = 0;
  // 表現型1: 体重減少（6ヶ月以内5%超）
  const w6m = parseFloat(getVal('weight_6m', 0));
  const wNow = parseFloat(getVal('patient_weight', 0));
  if (w6m > 0 && wNow > 0) {
    const pct = ((w6m - wNow) / w6m) * 100;
    if (pct > 5) pheno++;
  }
  // 表現型2: 低BMI
  const bmi = parseFloat(getVal('patient_bmi', 0));
  const age = parseInt(getVal('patient_age', 0));
  if (bmi > 0) {
    if ((age >= 70 && bmi < 20) || (age < 70 && bmi < 18.5)) pheno++;
  }
  // 表現型3: 骨格筋量減少（下腿周囲長）
  const calf = parseFloat(getVal('glim_calf', 0));
  const sex = getVal('patient_sex');
  if (calf > 0 && sex) {
    if ((sex === 'M' && calf < 34) || (sex === 'F' && calf < 33)) pheno++;
  }

  let etio = 0;
  // 病因1: 食事摂取低下（G8 A ≤ 1 で該当とする）
  if (gv('g8_a') <= 1) etio++;
  // 病因2: 炎症
  etio += gv('glim_inflammation');

  staffData._glim_pheno = pheno;
  staffData._glim_etio = etio;
  const diag = (pheno >= 1 && etio >= 1);
  const j = diag ? 'GLIM低栄養' : '低栄養なし';
  staffData._glim_judge = j;
  return { text: `GLIM: 表現型 ${pheno}/3, 病因 ${etio}/2`, judge: j };
}

// --- E-PASS PRS（年齢・mFI-5 DM 流用 + 追加項目） ---
function calcEPASS() {
  const age = parseFloat(getVal('patient_age', 0));
  const dm = gv('mfi5_dm'); // mFI-5から流用
  const prs = -0.0686 + 0.00345 * age
    + 0.323 * gv('epass_heart') + 0.205 * gv('epass_lung')
    + 0.153 * dm + 0.148 * gv('epass_ps') + 0.0666 * gv('epass_asa');
  staffData._epass_prs = prs.toFixed(4);
  let j = '低リスク';
  if (prs >= 0.5) j = '高リスク';
  else if (prs >= 0.3) j = '中リスク';
  staffData._epass_judge = j;
  return { text: `E-PASS PRS: ${prs.toFixed(4)}`, judge: j };
}

// --- CGA概要（各ステップから自動統合） ---
function calcCGA() {
  const cga = {};
  // 身体機能 ← IADL
  const iadl = staffData._iadl_score;
  if (iadl !== undefined) {
    if (iadl >= 7) cga.physical = '自立';
    else if (iadl >= 5) cga.physical = '一部介助';
    else if (iadl >= 3) cga.physical = '要介助';
    else cga.physical = '全介助';
  }
  // 認知 ← Mini-Cog
  const mc = staffData._minicog_score;
  if (mc !== undefined) {
    if (mc >= 4) cga.cognitive = '問題なし';
    else if (mc >= 3) cga.cognitive = 'MCI疑い';
    else cga.cognitive = '認知症疑い';
  }
  // 栄養 ← MNA-SF
  const mna = staffData._mnasf_score;
  if (mna !== undefined) {
    if (mna >= 12) cga.nutrition = '良好';
    else if (mna >= 8) cga.nutrition = 'At risk';
    else cga.nutrition = '低栄養';
  }
  // 併存疾患 ← 追加入力
  cga.comorbidity = getVal('cga_comorbidity', '-');
  // 社会 ← 基本情報
  cga.social = getVal('cga_social', '-');

  staffData._cga = cga;
  return cga;
}

function recalcAll() {
  try { calcG8(); } catch(e) {}
  try { calcCFS(); } catch(e) {}
  try { calcFried(); } catch(e) {}
  try { calcMFI5(); } catch(e) {}
  try { calcMiniCog(); } catch(e) {}
  try { calcIADL(); } catch(e) {}
  try { calcMNASF(); } catch(e) {}
  try { calcGLIM(); } catch(e) {}
  try { calcEPASS(); } catch(e) {}
  try { calcCGA(); } catch(e) {}
}

function tryLoadPatient() {

  if (!pid) { alert('患者IDを入力してください'); return; }
  const foundPatient = loadPatientData(pid);
  const foundNurse = loadNurseData(pid);

    msgs.push('<span style="color:#27ae60; font-weight:600;">患者データ読込済（G8, 体重, IADL, Fried一部）</span>');
  } else {
    msgs.push('<span style="color:#e74c3c;">患者データなし（患者用アンケート未回答）</span>');
  }
  if (foundNurse) {
    msgs.push('<span style="color:#1a5276; font-weight:600;">看護師データ読込済（基本情報, G8, CFS, J-CHS計測, Mini-Cog, mFI-5）</span>');
  } else {

  // 再描画して反映

}

function calcWeightAndBMI() {
  saveCurrentStep();
  const h = parseFloat(getVal('patient_height', 0)) / 100;
  const wNow = parseFloat(getVal('patient_weight', 0));
  const w3m = parseFloat(getVal('weight_3m', 0));
  const w6m = parseFloat(getVal('weight_6m', 0));
  const w1y = parseFloat(getVal('weight_1y', 0));

  const msgs = [];
  const filled = [];

  // --- BMI ---
  if (h > 0 && wNow > 0) {
    const bmi = wNow / (h * h);
    const bmiStr = bmi.toFixed(1);
    staffData.patient_bmi = bmiStr;
    msgs.push(`BMI = ${bmiStr} kg/m²`);

    // → G8 F項 (BMI区分) を自動設定
    let g8f;
    if (bmi < 19) g8f = 0;
    else if (bmi < 21) g8f = 1;
    else if (bmi < 23) g8f = 2;
    else g8f = 3;
    staffData.g8_f = g8f;
    const g8fLabels = {0:'19未満', 1:'19-21', 2:'21-23', 3:'23以上'};
    filled.push(`G8 F項(BMI) → ${g8fLabels[g8f]}（${bmiStr}）`);
  }

  // --- 3ヶ月間の体重変化 → G8 B項 ---
  if (wNow > 0 && w3m > 0) {
    const diff3m = w3m - wNow;
    const pct3m = ((diff3m / w3m) * 100).toFixed(1);
    msgs.push(`3ヶ月間の変化: ${diff3m > 0 ? '-' : '+'}${Math.abs(diff3m).toFixed(1)}kg（${diff3m > 0 ? '-' : '+'}${Math.abs(pct3m)}%）`);

    let g8b;
    if (diff3m >= 3) g8b = 0;       // 3kg以上の減少
    else if (diff3m >= 1) g8b = 2;   // 1-3kgの減少
    else g8b = 3;                     // 減少なし
    staffData.g8_b = g8b;
    const g8bLabels = {0:'3kg以上の減少', 2:'1-3kgの減少', 3:'減少なし'};
    filled.push(`G8 B項(体重変化) → ${g8bLabels[g8b]}`);
  }

  // --- 半年間の体重変化 → 改訂J-CHS 体重減少 ---
  if (wNow > 0 && w6m > 0) {
    const diff6m = w6m - wNow;
    const pct6m = ((diff6m / w6m) * 100).toFixed(1);
    msgs.push(`半年間の変化: ${diff6m > 0 ? '-' : '+'}${Math.abs(diff6m).toFixed(1)}kg（${diff6m > 0 ? '-' : '+'}${Math.abs(pct6m)}%）`);

    // 改訂J-CHS: 6ヶ月で2kg以上の減少
    const friedWt = diff6m >= 2 ? 1 : 0;
    staffData.fried_wt = friedWt;
    filled.push(`改訂J-CHS 体重減少 → ${friedWt ? '該当する' : '該当しない'}（6ヶ月間で${diff6m > 0 ? '-' : '+'}${Math.abs(diff6m).toFixed(1)}kg、基準: 2kg以上）`);
  }

  // --- 1年間の体重変化（参考情報） ---
  if (wNow > 0 && w1y > 0) {
    const diff1y = w1y - wNow;
    const pct1y = ((diff1y / w1y) * 100).toFixed(1);
    msgs.push(`1年間の変化: ${diff1y > 0 ? '-' : '+'}${Math.abs(diff1y).toFixed(1)}kg（${diff1y > 0 ? '-' : '+'}${Math.abs(pct1y)}%）`);
  }

  // 結果表示
  const calcEl = document.getElementById('weightCalcResult');
  if (calcEl) {
    calcEl.innerHTML = msgs.length
      ? '<strong>計算結果:</strong><br>' + msgs.map(m => '・' + m).join('<br>')
      : '<span style="color:#e74c3c;">身長・体重を入力してください</span>';
  }
  const fillEl = document.getElementById('autoFillResult');
  if (fillEl) {
    fillEl.innerHTML = filled.length
      ? '<strong style="color:#27ae60;">自動反映済み:</strong><br>' + filled.map(f => '✓ ' + f).join('<br>')
      : '';
  }
}

// =========================================================================
// PDF出力（サマリー画面をPDFとして保存）
// =========================================================================
function exportPDF() {
  if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
    alert('PDFライブラリを読み込めませんでした。\nインターネットに接続した状態でページを再読み込みしてください。');
    return;
  }

  saveCurrentStep();
  recalcAll();

  const btn = document.querySelector('button[onclick="exportPDF()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'PDF生成中...'; }

  const navBars = document.querySelectorAll('.nav-bar');
  const exportRow = document.querySelector('#stepContent div[style*="justify-content:center"][style*="gap:16px"]');
  const topBtn = document.querySelector('#stepContent div[style*="text-align:center"][style*="margin-top:12px"]');
  navBars.forEach(el => el.style.display = 'none');
  if (exportRow) exportRow.style.display = 'none';
  if (topBtn) topBtn.style.display = 'none';

  const sidebar = document.querySelector('.sidebar');
  const mainEl = document.querySelector('.main');
  const hamburger = document.querySelector('.hamburger');
  const origMainMargin = mainEl ? mainEl.style.marginLeft : '';
  if (sidebar) sidebar.style.display = 'none';
  if (mainEl) mainEl.style.marginLeft = '0';
  if (hamburger) hamburger.style.display = 'none';

  const stepContent = document.getElementById('stepContent');
  const pdfHeader = document.createElement('div');
  pdfHeader.id = 'pdfHeader';
  pdfHeader.style.cssText = 'text-align:center; margin-bottom:16px; padding:16px; background:#2c3e50; color:#fff; border-radius:8px;';
  const pid = getVal('patient_id') || '';
  const pname = getVal('patient_name') || '';
  const dt = getVal('assessment_date') || new Date().toISOString().slice(0,10);
  pdfHeader.innerHTML = '<div style="font-size:18px; font-weight:700;">術前全身状態評価レポート</div>' +
    '<div style="font-size:13px; margin-top:6px;">患者ID: 10' + pid + '　' + pname + '　評価日: ' + dt + '</div>';
  stepContent.insertBefore(pdfHeader, stepContent.firstChild);

  const origWidth = stepContent.style.width;
  const origMaxWidth = stepContent.style.maxWidth;
  stepContent.style.width = '800px';
  stepContent.style.maxWidth = '800px';

  function cleanup() {
    navBars.forEach(el => el.style.display = '');
    if (exportRow) exportRow.style.display = '';
    if (topBtn) topBtn.style.display = '';
    if (sidebar) sidebar.style.display = '';
    if (mainEl) mainEl.style.marginLeft = origMainMargin;
    if (hamburger) hamburger.style.display = '';
    const hdr = document.getElementById('pdfHeader');
    if (hdr) hdr.remove();
    stepContent.style.width = origWidth;
    stepContent.style.maxWidth = origMaxWidth;
    if (btn) { btn.disabled = false; btn.textContent = 'PDF出力'; }
  }

  setTimeout(() => {
    html2canvas(stepContent, {
      scale: 1.5,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      windowWidth: 800,
    }).then(function(canvas) {
      try {
        var jsPDF = window.jspdf.jsPDF;
        var pdf = new jsPDF('p', 'mm', 'a4');
        var pageW = 210;
        var pageH = 297;
        var margin = 10;
        var contentW = pageW - margin * 2;
        var contentH = pageH - margin * 2;
        var imgW = canvas.width;
        var imgH = canvas.height;
        var ratio = contentW / imgW;
        var sliceHPx = Math.floor(contentH / ratio);

        var srcY = 0;
        var page = 0;
        while (srcY < imgH) {
          if (page > 0) pdf.addPage();
          var thisSliceH = Math.min(sliceHPx, imgH - srcY);
          var sliceCanvas = document.createElement('canvas');
          sliceCanvas.width = imgW;
          sliceCanvas.height = thisSliceH;
          var sCtx = sliceCanvas.getContext('2d');
          sCtx.drawImage(canvas, 0, srcY, imgW, thisSliceH, 0, 0, imgW, thisSliceH);
          var sliceData = sliceCanvas.toDataURL('image/jpeg', 0.85);
          pdf.addImage(sliceData, 'JPEG', margin, margin, contentW, thisSliceH * ratio);
          srcY += thisSliceH;
          page++;
        }

        var filename = 'assessment_' + (pid || 'unknown') + '_' + dt.replace(/-/g, '') + '.pdf';
        var pdfBlob = pdf.output('blob');
        var url = URL.createObjectURL(pdfBlob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 1000);
        cleanup();
      } catch(e) {
        console.error('PDF生成エラー:', e);
        alert('PDF生成に失敗しました:\n' + e.message);
        cleanup();
      }
    }).catch(function(err) {
      console.error('画面キャプチャエラー:', err);
      alert('PDF生成に失敗しました。\nもう一度お試しください。');
      cleanup();
    });
  }, 300);
}

  const sex = getVal('patient_sex') === 'M' ? '男性' : getVal('patient_sex') === 'F' ? '女性' : '';
  const cga = staffData._cga || {};

  const headers = [

    '現体重(kg)','3ヶ月前体重(kg)','半年前体重(kg)','1年前体重(kg)','BMI',
    '社会的支援',
    // G8 全項目
    'G8_A(食事)','G8_B(体重)','G8_C(可動性)','G8_E(神経精神)','G8_F(BMI区分)','G8_H(処方薬)','処方薬数','G8_P(自己健康評価)','G8_年齢区分',
    'G8スコア','G8判定',
    // CFS
    'CFS','CFS判定',
    // J-CHS 全項目
    'J-CHS_体重減少','J-CHS_握力判定','右握力(kg)','左握力(kg)',
    'J-CHS_疲労感','J-CHS_歩行速度判定','歩行速度(m/s)','J-CHS_身体活動',
    '改訂J-CHS合計','改訂J-CHS判定',
    // Mini-Cog
    'Mini-Cog_遅延再生','Mini-Cog_時計描画','Mini-Cog合計','Mini-Cog判定',
    // IADL 全項目
    'IADL_A(電話)','IADL_B(買い物)','IADL_C(食事支度)','IADL_D(家事)','IADL_E(洗濯)','IADL_F(交通)','IADL_G(服薬)','IADL_H(金銭)',
    'IADL合計','IADL判定',
    // mFI-5
    'mFI5_心不全','mFI5_糖尿病','mFI5_COPD','mFI5_機能非自立','mFI5_高血圧',
    'mFI-5合計','mFI-5判定',
    // MNA-SF
    'MNA-SF_D(ストレス)',
    'MNA-SF合計','MNA-SF判定',
    // GLIM
    '下腿周囲長(cm)','GLIM_炎症',
    'GLIM表現型','GLIM病因','GLIM診断',
    // E-PASS
    'E-PASS_心疾患','E-PASS_肺疾患','ECOG_PS','ASA-PS',
    'E-PASS_PRS','E-PASS判定',
    // CGA
    'CGA身体','CGA認知','CGA栄養','CGA併存疾患','CGA社会支援','CGAメモ',
    // Fried 患者自己申告
    '患者_疲労感','患者_軽い運動','患者_定期的運動','患者_MNA-SF_D',
    // メタ
    '患者入力あり','看護師入力あり'
  ];

  const values = [
    // 基本情報
    getVal('assessment_date'), '10' + getVal('patient_id'), getVal('patient_name'),
    getVal('patient_age'), sex, getVal('patient_height'),
    getVal('patient_weight'), getVal('weight_3m'), getVal('weight_6m'), getVal('weight_1y'),
    getVal('patient_bmi'),
    getVal('cga_social'),
    // G8 全項目
    getVal('g8_a'), getVal('g8_b'), getVal('g8_c'), getVal('g8_e'), getVal('g8_f'), getVal('g8_h'), getVal('g8_drug_count'), getVal('g8_p'), getVal('g8_age'),
    staffData._g8_score ?? '', staffData._g8_judge ?? '',
    // CFS
    staffData._cfs_val ?? '', staffData._cfs_judge ?? '',
    // J-CHS 全項目
    getVal('fried_wt'), getVal('fried_grip'), getVal('fried_grip_r'), getVal('fried_grip_l'),
    getVal('fried_exhaust'), getVal('fried_walk'), getVal('fried_walk_speed'), getVal('fried_activity'),
    staffData._fried_score ?? '', staffData._fried_judge ?? '',
    // Mini-Cog
    getVal('minicog_recall'), getVal('minicog_clock'), staffData._minicog_score ?? '', staffData._minicog_judge ?? '',
    // IADL 全項目 (parseFloat to get score from suffixed values)
    parseFloat(getVal('iadl_0', '')), parseFloat(getVal('iadl_1', '')), parseFloat(getVal('iadl_2', '')), parseFloat(getVal('iadl_3', '')),
    parseFloat(getVal('iadl_4', '')), parseFloat(getVal('iadl_5', '')), parseFloat(getVal('iadl_6', '')), parseFloat(getVal('iadl_7', '')),
    staffData._iadl_score ?? '', staffData._iadl_judge ?? '',
    // mFI-5
    getVal('mfi5_chf'), getVal('mfi5_dm'), getVal('mfi5_copd'), getVal('mfi5_func'), getVal('mfi5_htn'),
    staffData._mfi5_score ?? '', staffData._mfi5_judge ?? '',
    // MNA-SF
    getVal('mnasf_d'),
    staffData._mnasf_score ?? '', staffData._mnasf_judge ?? '',
    // GLIM
    getVal('glim_calf'), getVal('glim_inflammation'),
    staffData._glim_pheno ?? '', staffData._glim_etio ?? '', staffData._glim_judge ?? '',
    // E-PASS
    getVal('epass_heart'), getVal('epass_lung'), getVal('epass_ps'), getVal('epass_asa'),
    staffData._epass_prs ?? '', staffData._epass_judge ?? '',
    // CGA
    cga.physical ?? '', cga.cognitive ?? '', cga.nutrition ?? '',
    cga.comorbidity ?? '', cga.social ?? '', getVal('cga_memo'),
    // 患者自己申告の生データ
    patientData ? (patientData.fried_exhaust ?? '') : '',
    patientData ? (patientData.fried_activity_q1 ?? '') : '',
    patientData ? (patientData.fried_activity_q2 ?? '') : '',
    patientData ? (patientData.mnasf_d ?? '') : '',
    // メタ
    patientData ? 'あり' : 'なし',
    nurseData ? 'あり' : 'なし'
  ];

  // IADL values: replace NaN with empty string
  for (let i = 0; i < values.length; i++) {
    if (typeof values[i] === 'number' && isNaN(values[i])) values[i] = '';
  }

  const csvContent = '\uFEFF' + [headers, values].map(row =>
    row.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')
  ).join('\n');

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const pid = getVal('patient_id', 'unknown');
  const dt = new Date().toISOString().slice(0,10).replace(/-/g, '');
  a.href = url;
  a.download = `assessment_${pid}_${dt}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  alert('CSVファイルをダウンロードしました。');
}
